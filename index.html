function touch(c){
  c.lastTouchedAt = nowISO();
}

function weekDefaultFuture(){
  var width = 0;
  try { width = Number(window.innerWidth) || 0; } catch (e) {}
  return width >= 640 ? 14 : 7;
}

function resetWeekRange(){
  VIEW.weekPast = 0;
  VIEW.weekFuture = weekDefaultFuture();
  WEEK_SCROLL_RT.busy = false;
  WEEK_SCROLL_RT.pendingLeftAdjust = 0;
  WEEK_SCROLL_RT.initPending = false;
  WEEK_SCROLL_RT.lastLeft = 0;
}

// The week grid reads best in landscape (wide date span). Lock to landscape
// while it is on screen and release otherwise, where the platform supports it
// (installed PWA on Android). Everywhere else this is a harmless no-op — the
// manifest keeps the app rotatable so portrait board/review/detail are
// unaffected. Called from render(); only acts when the desired state flips.
function syncOrientationLock(){
  var wantLandscape = VIEW.name === "board" && VIEW.boardMode === "week";
  if (wantLandscape === LAST_ORIENT_WEEK) return;
  LAST_ORIENT_WEEK = wantLandscape;
  try {
    var so = (typeof screen !== "undefined") ? screen.orientation : null;
    if (!so) return;
    if (wantLandscape && so.lock) {
      var p = so.lock("landscape");
      if (p && p.catch) p.catch(function(){});
    } else if (so.unlock) {
      so.unlock();
    }
  } catch (e) {}
}

function setBoardMode(mode){
  var next = mode === "week" ? "week" : mode === "day" ? "day" : "board";
  var prev = VIEW.boardMode || "board";
  VIEW.boardMode = next;
  if (next === "day") VIEW.dayDate = todayISO();
  if (next === "week" && prev !== "week") {
    VIEW.weekPast = 0;
    VIEW.weekFuture = weekDefaultFuture();
    WEEK_SCROLL_RT.initPending = true;
  }
  if (next !== "week") resetWeekRange();
  render();
}

function openDayView(date){
  VIEW.boardMode = "day";
  VIEW.dayDate = /^\d{4}-\d{2}-\d{2}$/.test(String(date || "")) ? String(date) : todayISO();
  render();
}

function shiftDayDate(delta){
  var base = Date.parse((VIEW.dayDate || todayISO()) + "T00:00:00");
  if (!Number.isFinite(base)) base = Date.parse(todayISO() + "T00:00:00");
  var d = new Date(base + (Number(delta) || 0) * 86400000);
  VIEW.dayDate = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  render();
}

function ensureWeekWrapBehavior(){
  if (VIEW.name !== "board" || VIEW.boardMode !== "week" || !document || !document.getElementById) return;
  var wrap = document.getElementById("weekWrap");
  if (!wrap) return;
  wrap.onscroll = function(){
    if (WEEK_SCROLL_RT.busy) return;
    var left = Number(wrap.scrollLeft) || 0;
    var width = Number(wrap.scrollWidth) || 0;
    var view = Number(wrap.clientWidth) || 0;
    WEEK_SCROLL_RT.lastLeft = left;
    if (width <= view) return;
    if (left <= 80) {
      WEEK_SCROLL_RT.busy = true;
      WEEK_SCROLL_RT.pendingLeftAdjust = width;
      VIEW.weekPast = (Number(VIEW.weekPast) || 0) + 7;
      render();
      return;
    }
    if (width - (left + view) <= 80) {
      WEEK_SCROLL_RT.busy = true;
      VIEW.weekFuture = (Number(VIEW.weekFuture) || 0) + 7;
      render();
    }
  };
  if (WEEK_SCROLL_RT.pendingLeftAdjust) {
    var prevWidth = WEEK_SCROLL_RT.pendingLeftAdjust;
    var nextWidth = Number(wrap.scrollWidth) || 0;
    wrap.scrollLeft = (Number(wrap.scrollLeft) || 0) + Math.max(0, nextWidth - prevWidth);
    WEEK_SCROLL_RT.lastLeft = Number(wrap.scrollLeft) || 0;
    WEEK_SCROLL_RT.pendingLeftAdjust = 0;
    WEEK_SCROLL_RT.busy = false;
  } else if (WEEK_SCROLL_RT.initPending) {
    var totalCols = (Number(VIEW.weekPast) || 0) + (Number(VIEW.weekFuture) || 0) + 1;
    var totalWidth = Number(wrap.scrollWidth) || 0;
    if (totalCols > 0 && totalWidth > 0) {
      var colWidth = totalWidth / totalCols;
      wrap.scrollLeft = Math.max(0, Math.round(colWidth * (Number(VIEW.weekPast) || 0)));
    }
    WEEK_SCROLL_RT.lastLeft = Number(wrap.scrollLeft) || 0;
    WEEK_SCROLL_RT.initPending = false;
  } else {
    // Plain data re-render (cell edit, sync merge): innerHTML replacement reset
    // the scroll position - restore where the user was, or the grid snaps back
    // to the far past and immediately triggers another past-extension.
    if (WEEK_SCROLL_RT.lastLeft) wrap.scrollLeft = WEEK_SCROLL_RT.lastLeft;
    WEEK_SCROLL_RT.busy = false;
  }
}

function updateCaseAdmittedAt(caseId, value){
  var date = /^\d{4}-\d{2}-\d{2}$/.test(String(value || "")) ? String(value) : todayISO();
  mutateCase(caseId, function(c){
    c.admittedAt = date;
    // Clamp EVERY earlier log row, not just the first: a lone clamped head row
    // would sort behind later stage changes and silently rewrite the current
    // stage at the next normalize.
    var rows = cloneArr(c.stageLog).map(function(row){
      return row && row.date < date ? { date:date, stageId:row.stageId } : row;
    });
    c.stageLog = normalizeStageLog(rows, c.admittedAt, c.stageId);
  });
}

function clearMiss(){
  MISS = null;
}

function queueFocusTarget(id, shouldSelect){
  PENDING_FOCUS = { id:id, select:!!shouldSelect };
}

function flushQueuedFocus(){
  if (!PENDING_FOCUS || !document || !document.getElementById) return;
  var next = PENDING_FOCUS;
  PENDING_FOCUS = null;
  var el = document.getElementById(next.id);
  if (!el) return;
  if (el.focus) el.focus();
  if (next.select && el.select) el.select();
}

function persist(){
  saveState();
  render();
  syncAfterSave();
}

function currentReviewCase(){
  var caseId = REVIEW.ids[REVIEW.index] || "";
  return DB.cases.find(function(c){ return c.id === caseId; }) || null;
}

function applyDailyRollover(force){
  var today = todayISO();
  var changed = !!force;
  DB.cases.forEach(function(c){
    var nextTodos = rolloverTodos(c, today);
    if (JSON.stringify(nextTodos) !== JSON.stringify(c.todos)) {
      // The mirror edit MUST be absorbed into entries: mirrors are rebuilt from
      // entries on every normalize/merge, so a bare todos write resurrects the
      // rolled-off items at the next sync (and never propagates the cleanup).
      c.todos = nextTodos;
      entriesReconcileLocal(c, nowISO(), today);
      changed = true;
    }
  });
  VIEW.nowDay = today;
  if (changed) {
    saveState();
    syncAfterSave();
  }
}

function ensureToday(){
  if (VIEW.nowDay !== todayISO()) {
    ensureStatsBootDay();
    applyDailyRollover(true);
    render();
  }
}

function mutateCase(caseId, fn){
  var target = DB.cases.find(function(c){ return c.id === caseId; });
  if (!target) return;
  fn(target);
  touch(target);
  target.todos = rolloverTodos(target, todayISO());
  // Absorb the mirror edits into the entries store (SPEC-F) so element-level
  // timestamps exist before this change is pushed by the sync engine.
  entriesReconcileLocal(target, nowISO(), todayISO());
  persist();
}

function reorderActiveByIds(ids){
  var set = new Set(ids);
  var sorted = ids.map(function(id){ return DB.cases.find(function(c){ return c.id === id; }); }).filter(Boolean);
  var idx = 0;
  DB.cases = DB.cases.map(function(c){
    if (c.status !== "active" || !set.has(c.id)) return c;
    var next = sorted[idx++];
    var copy = Object.assign({}, next);
    copy.order = idx - 1;
    return copy;
  });
}

function boardCases(){
  return boardOrder(DB.cases, todayISO());
}

// Android back-button support. Every deepening step (board -> search/review/detail,
// or opening a bottom sheet) pushes one history entry plus a restore snapshot on
// NAV.stack. popstate pops the snapshot and restores it. UI-initiated closes must
// consume their history entry too (NAV.ignore skips the resulting popstate), or
// stale entries would leave "dead" back presses.
function navPush(entry){
  NAV.stack.push(entry);
  try { history.pushState({ wb:NAV.stack.length }, ""); } catch (e) {}
}

function navSnapshotView(){
  return { kind:"view", view:JSON.parse(JSON.stringify(VIEW)) };
}

function navNoteSheetOpen(){
  if (!SHEET.name) navPush({ kind:"sheet" });
}

function navUnwindAll(){
  var n = NAV.stack.length;
  if (!n) return;
  NAV.stack = [];
  NAV.ignore += 1;
  try { history.go(-n); } catch (e) {}
}

function handlePopState(ev){
  if (NAV.ignore > 0) {
    NAV.ignore -= 1;
    return;
  }
  var target = ev && ev.state && Number(ev.state.wb);
  if (!Number.isFinite(target) || target < 0) target = 0;
  var entry = null;
  while (NAV.stack.length > target) entry = NAV.stack.pop();
  if (!entry) return;
  if (entry.kind === "sheet") {
    SHEET.name = "";
    SHEET.draft = {};
    renderSheet();
    return;
  }
  SHEET.name = "";
  SHEET.draft = {};
  clearMiss();
  VIEW = entry.view;
  if (VIEW.name === "board" && VIEW.boardMode === "week") WEEK_SCROLL_RT.initPending = true;
  render();
}

function openBoard(){
  navUnwindAll();
  clearMiss();
  REVIEW = { ids:[], index:0, mode:"actions", empty:false, noteDraft:"", copied:false, outboxStatus:"" };
  if ((VIEW.boardMode || "board") === "week") WEEK_SCROLL_RT.initPending = true;
  VIEW = { name:"board", caseId:"", editingMeta:false, editingLabel:false, stagePickerFor:"", nowDay:todayISO(), boardMode:VIEW.boardMode || "board", dayDate:VIEW.dayDate || todayISO(), searchQuery:"", searchMonth:"", searchStageId:"", weekPast:Number(VIEW.weekPast) || 0, weekFuture:Number(VIEW.weekFuture) || weekDefaultFuture() };
  render();
}

function openDetail(caseId){
  if (VIEW.name !== "detail") navPush(navSnapshotView());

function downloadBackup(){
  var today = todayISO();
  var payload = JSON.stringify(normalizeState(DB), null, 2);
  if (typeof Blob === "undefined" || typeof URL === "undefined" || !URL.createObjectURL) return;
  var blob = new Blob([payload], { type:"application/json;charset=utf-8" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "wardbook-backup-" + today + ".json";
  if (a.click) a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 0);
}

function restoreBackupFile(input){
  var file = input && input.files && input.files[0];
  if (!file || typeof FileReader === "undefined") return;
  var reader = new FileReader();
  reader.onload = function(){
    try {
      var parsed = JSON.parse(String(reader.result || "null"));
      if (typeof confirm === "function" && !confirm(STR.restoreConfirm)) return;
      DB = normalizeState(parsed);
      // Design session 2026-07-09 decision 1: restore recovers THIS device only.
      // Resetting the sync state makes the next sync a baseline (newer server
      // data wins back; cases missing from the backup return from the server),
      // and the restored flags keep these cases alive against remote tombstones.
      if (SYNC && SYNC.enabled) {
        SYNC.state = syncEmptyState();
        DB.cases.forEach(function(c){ syncMarkRestored(SYNC.state, c.id); });
        saveSync();
      }
      saveState();
      render();
      closeSheet();
      syncAfterSave();
    } catch (e) {}
  };
  reader.readAsText(file, "utf-8");
}

// ---- shared per-case list CRUD (next / todos / pendings / seeds) -----------
// All side effects (touch, rollover, entries absorption, persist) come from
// mutateCase, so these three cover the whole family identically. Queuing the
// focus BEFORE the re-render keeps the add-input focused for rapid entry.
function addListItem(prop, caseId, value, focusId, make){
  var text = String(value || "").trim();
  if (!text) return false;
  if (focusId) queueFocusTarget(focusId, false);
  mutateCase(caseId, function(c){ c[prop].push(make(text, c)); });
  return true;
}

function patchListItem(prop, caseId, itemId, fn){
  mutateCase(caseId, function(c){
    var item = c[prop].find(function(x){ return x.id === itemId; });
    if (item) fn(item);
  });
}

function deleteListItem(prop, type, caseId, itemId){
  mutateCase(caseId, function(c){
    var item = c[prop].find(function(x){ return x.id === itemId; });
    if (item) pushTrashEntry(type, c, item);
    c[prop] = c[prop].filter(function(x){ return x.id !== itemId; });
  });
}

  var itemType = SHEET.draft && SHEET.draft.itemType || "next";
  var text = String(SHEET.draft && SHEET.draft.text || "").trim();
  if (!text) return;
  mutateCase(caseId, function(c){
    if (itemType === "pending") c.pendings.push({ id:uid(), text:text, backOn:date });
    else if (itemType === "todo") c.todos.push({ id:uid(), text:text, done:false, createdOn:date });
    else if (itemType.indexOf("cat:") === 0) {
      var cat = chartCatById(itemType.slice(4));
      if (!cat) return;
      c.chart = normalizeChart(c.chart);
      if (cat.kind === "event") {
        c.chart.items.push({ id:uid(), catId:cat.id, kind:"event", name:text, date:date, status:"planned" });
      } else if (cat.kind === "value") {
        // Same-named row is reused so "echo planned twice" stays one chart row.
        var item = c.chart.items.find(function(row){ return row.catId === cat.id && row.kind === "value" && row.name === text; });
        if (!item) {
          item = { id:uid(), catId:cat.id, kind:"value", name:text, values:{}, planned:{} };
          c.chart.items.push(item);
        }
        item.planned = isObj(item.planned) ? item.planned : {};
        item.planned[date] = true;
      }
    }
    else c.next.push({ id:uid(), text:text, due:date });
  });
  SHEET.draft.text = "";
  renderSheet();
  queueFocusTarget("weekCellInput", false);
  flushQueuedFocus();
}

// ---- shared config-list editing (stages / chartCats) -----------------------
function swapAt(list, index, direction){
  var target = direction === "up" ? index - 1 : index + 1;
  if (index < 0 || target < 0 || target >= list.length) return false;
  var picked = list[index];
  list[index] = list[target];
  list[target] = picked;
  return true;
}

function configRename(key, index, value){
  var list = DB.config[key];
  if (!list[index]) return;
  list[index].name = String(value || "").trim() || list[index].name;
  configChanged();
}

function configSetColor(key, index, color){
  var list = DB.config[key];
  if (!list[index]) return;
  list[index].color = color;
  configChanged();
}

function configMove(key, index, direction){
  var next = cloneArr(DB.config[key]);
  if (!swapAt(next, index, direction)) return;
  DB.config[key] = next;
  configChanged();
}

function configDelete(key, index, useCount){
  var list = DB.config[key];
  if (!list[index] || list.length <= 1) return;
  if (useCount) {
    if (typeof alert === "function") alert(STR.stageInUse + " " + useCount);
    return;
  }
  list.splice(index, 1);
  configChanged();
}

  names.forEach(function(name){ seen[name] = true; });
  cloneArr(DB.cases).forEach(function(c){
    cloneArr(c && c.chart && c.chart.items).forEach(function(item){
      if (item && item.catId === catId && item.name && !seen[item.name]) {
        seen[item.name] = true;
        names.push(item.name);
      }
    });
  });
  return names.slice(0, 10);
}

function openChartItem(caseId, catId, itemId){

  openSheetWithDraft("chartItem", {
    caseId:caseId,
    catId:catId,
    itemId:itemId || "",
    kind:kind,
    name:item ? item.name : "",
    startDate:item && item.startDate ? item.startDate : todayISO(),
    endDate:item && item.endDate ? item.endDate : "",
    date:item && item.date ? item.date : todayISO()

function saveChartItem(){
  var d = SHEET.draft || {};
  var kind = d.kind === "band" || d.kind === "event" ? d.kind : "value";
  var name = String(d.name || "").trim();
  if (!name) return;
  mutateCase(d.caseId, function(c){
    c.chart = normalizeChart(c.chart);
    var startDate = safeDate(d.startDate, todayISO());
    var endDate = d.endDate ? safeDate(d.endDate, null) : null;
    var date = safeDate(d.date, todayISO());
    if (d.itemId) {
      var item = c.chart.items.find(function(row){ return row.id === d.itemId; });
      if (!item) return;
      item.name = name;
      if (kind === "band") { item.startDate = startDate; item.endDate = endDate; }
      if (kind === "event") item.date = date;
    } else {
      var row = { id:uid(), catId:d.catId, kind:kind, name:name };
      if (kind === "value") { row.values = {}; row.planned = {}; }
      if (kind === "band") { row.startDate = startDate; row.endDate = endDate; }
      // Future-dated events start as plans, today/past ones as records.
      if (kind === "event") { row.date = date; row.status = date > todayISO() ? "planned" : "done"; }
      c.chart.items.push(row);
    }
  });
  closeSheet();
}

// Shared prologue of every chart-item mutation: normalize, locate, kind-guard.
function patchChartItem(caseId, itemId, kind, fn){
  mutateCase(caseId, function(c){
    c.chart = normalizeChart(c.chart);
    var item = c.chart.items.find(function(row){ return row.id === itemId; });
    if (!item || (kind && item.kind !== kind)) return;
    fn(item, c);
  });
}

function removeChartItem(caseId, itemId){

  });
}

// ---- MAR-style plan resolution (SPEC-F) ----
function toggleEventDone(caseId, itemId, onDate){
  patchChartItem(caseId, itemId, "event", function(item){
    if (item.status === "planned") {
      item.status = "done";
      // Resolving an overdue plan records the actual done date, not the planned one.
      if (onDate) item.date = onDate;
    } else {
      item.status = "planned";
    }
  });
}

function rescheduleChartEntry(caseId, itemId, fromDate, newDate){
  var next = safeDate(newDate, "");
  if (!next) return;
  patchChartItem(caseId, itemId, "", function(item){
    if (item.kind === "event") {
      item.date = next;
      item.status = "planned";
    } else if (item.kind === "value") {
      item.planned = isObj(item.planned) ? item.planned : {};
      if (fromDate) delete item.planned[fromDate];
      item.planned[next] = true;
    }
  });
}

// Cancel for a planned EVENT is the normal delete flow (trash + tombstone);
// a value-row plan is just a mark, so cancelling clears that one date.
function cancelValuePlan(caseId, itemId, date){
  patchChartItem(caseId, itemId, "value", function(item){
    if (isObj(item.planned)) delete item.planned[date];
  });
}

function addValuePlan(caseId, itemId, date){
  patchChartItem(caseId, itemId, "value", function(item){
    item.planned = isObj(item.planned) ? item.planned : {};
    item.planned[date] = true;
  });
}

// Export-text section: "## title", then one line per item (fmt may return an
// array of lines), "- -" when empty.
function pushSection(lines, title, list, fmt){
  lines.push("", "## " + title);
  if (!list.length) { lines.push("- -"); return; }
  list.forEach(function(item){
    var rows = fmt(item);
    (Array.isArray(rows) ? rows : [rows]).forEach(function(row){ lines.push(row); });
  });
}

function fmtNextLine(item){ return "- " + item.text + (item.due ? " (" + item.due + ")" : ""); }
function fmtPendingLine(item){ return "- " + item.text + (item.backOn ? " (" + item.backOn + ")" : ""); }

function formatSeedSnapshot(seed){
  var snap = isObj(seed && seed.snapshot) ? seed.snapshot : {};
  var parts = [];
  if (snap.label) parts.push(String(snap.label) + " D" + (Number.isFinite(Number(snap.day)) ? Number(snap.day) : 1));
  if (snap.stageName) parts.push(String(snap.stageName));
  if (snap.phaseNote) parts.push(String(snap.phaseNote));
  return parts.join(" / ");
}

function dischargeExportText(caseId){
  var c = DB.cases.find(function(item){ return item.id === caseId; });
  if (!c) return "";
  var dayNow = c.dischargedAt || todayISO();
  var lines = [
    "# " + c.label,
    "",
    "- Dx: " + (c.dxTags.length ? c.dxTags.join(", ") : "-"),
    "- Meta: " + (compactMeta(c) || "-"),
    "- Stay: " + c.admittedAt + " D1-D" + computeDay(c.admittedAt, dayNow),
    "",
    "## Stage history"
  ];
  cloneArr(c.stageLog).forEach(function(item){
    lines.push("- " + item.date + " " + stageNameFor(item.stageId));
  });
  lines.push("", "## Phase", c.phaseNote || "-");
  pushSection(lines, "Remaining Next", cloneArr(c.next), fmtNextLine);
  pushSection(lines, "Pending", cloneArr(c.pendings), fmtPendingLine);
  pushSection(lines, "Seeds", cloneArr(c.seeds), function(seed){
    return ["- " + seed.text, "  - " + formatSeedSnapshot(seed)];
  });
  return lines.join("\n");
}

function dayExportText(caseId){
  var c = DB.cases.find(function(item){ return item.id === caseId; });

function moveCaseDirection(caseId, direction){
  // Operate on the DISPLAYED order (urgent-first board order, same as drag &
  // drop) - moving against raw order values jumps unpredictably whenever a
  // 戻り予定 case is hoisted to the top.
  var ids = boardCases().map(function(c){ return c.id; });
  var next = moveIdInList(ids, caseId, direction);
  if (next.join("\n") === ids.join("\n")) return;
  reorderActiveByIds(next);
  saveState();
  render();
  syncAfterSave();
}

// Drag & drop: no re-render between pointerdown and pointerup. Re-rendering
// mid-gesture destroys the captured element, which kills the pointer stream on
// touch devices (the original bug). Hit-testing runs on document-level
// pointermove against the always-present dropzones instead.
function startDragCase(ev, caseId){
  if (!ev) return;
  if (ev.stopPropagation) ev.stopPropagation();
  if (ev.preventDefault) ev.preventDefault();
  if (ev.pointerId != null && ev.target && ev.target.setPointerCapture) {
    try { ev.target.setPointerCapture(ev.pointerId); } catch (e) {}
  }
  DND.activeId = caseId;
  DND.hoverIndex = -1;
  var card = ev.target && ev.target.closest ? ev.target.closest(".card") : null;
  if (card && card.classList) card.classList.add("dragging");
}

function nearestDropIndex(clientY){
  if (!document.querySelectorAll) return -1;
  var zones = document.querySelectorAll(".dropzone");
  var best = -1;
  var bestDist = Infinity;
  for (var i = 0; i < zones.length; i += 1) {
    var rect = zones[i].getBoundingClientRect();
    var dist = Math.abs(rect.top + rect.height / 2 - clientY);
    if (dist < bestDist) { bestDist = dist; best = i; }
  }
  return best;
}

function dragMove(ev){
  if (!DND.activeId) return;
  if (ev && ev.preventDefault) ev.preventDefault();
  var idx = nearestDropIndex(ev.clientY);
  if (idx === DND.hoverIndex) return;
  DND.hoverIndex = idx;
  var zones = document.querySelectorAll(".dropzone");
  for (var i = 0; i < zones.length; i += 1) {
    if (zones[i].classList) zones[i].classList.toggle("on", i === idx);
  }
}

function dragEnd(){
  if (!DND.activeId) return;
  if (DND.hoverIndex >= 0) dropReorder(DND.hoverIndex);
  else cancelDrag();
}

function dropReorder(index){
  if (!DND.activeId) return;
  var ids = boardCases().map(function(c){ return c.id; });
  var from = ids.indexOf(DND.activeId);
  if (from < 0) {
    DND.activeId = "";
    DND.hoverIndex = -1;
    render();
    return;
  }
  var nextIds = ids.slice();
  var picked = nextIds.splice(from, 1)[0];
  var target = index;
  if (target > from) target -= 1;
  if (target < 0) target = 0;
  if (target > nextIds.length) target = nextIds.length;
  nextIds.splice(target, 0, picked);
  reorderActiveByIds(nextIds);
  DND.activeId = "";
  DND.hoverIndex = -1;
  saveState();
  render();
  syncAfterSave();
}

function cancelDrag(){
  if (!DND.activeId && DND.hoverIndex < 0) return;
  DND.activeId = "";
  DND.hoverIndex = -1;
  render();
}

        return '<label class="lineitem" onclick="event.stopPropagation()"><input class="check" type="checkbox" ' + (item.status === "done" ? 'checked ' : '') + 'onclick="toggleEventDone(\'' + esc(g.caseId) + '\',\'' + esc(item.id) + '\')"><div class="linegrow"><div class="text">' + esc(item.text) + '</div></div></label>';
      }
      if (item.type === "valuePlan") {
        return '<div class="lineitem" onclick="event.stopPropagation();openChartValue(\'' + esc(g.caseId) + '\',\'' + esc(item.id) + '\',\'' + esc(date) + '\')"><div class="linegrow"><div class="text">◇ ' + esc(item.text) + '</div><div class="faint">' + esc(item.entered ? STR.markDone : STR.valueEnterPh) + '</div></div></div>';
      }
      if (item.type === "discharge") {
        return '<div class="lineitem" onclick="openDetail(\'' + esc(g.caseId) + '\')"><div class="linegrow"><div class="text">★ ' + esc(STR.dayDischargeLabel) + '</div></div></div>';
      }
      var prefix = item.type === "pending" ? STR.dayPendingPrefix : STR.dayNextPrefix;
      return '<div class="lineitem" onclick="openDetail(\'' + esc(g.caseId) + '\')"><div class="linegrow"><div class="text"><span class="faint">' + esc(prefix) + ':</span> ' + esc(item.text) + '</div></div></div>';
    }).join('') + '</div></div>';
  }).join('') : '<div class="empty">' + esc(STR.dayEmpty) + '</div>';
  return nav + bodyHtml;
}

function runSearch(){

  var month = document.getElementById("searchMonth");
  var stage = document.getElementById("searchStage");
  VIEW.searchQuery = q ? q.value : VIEW.searchQuery;
  VIEW.searchMonth = month ? month.value : VIEW.searchMonth;
  VIEW.searchStageId = stage ? stage.value : VIEW.searchStageId;
  render();
}

function renderSearch(){
  var hits = searchCases(DB.cases, VIEW.searchQuery, { month:VIEW.searchMonth, stageId:VIEW.searchStageId });

  cloneArr(DB.cases).filter(function(c){ return c.status === "discharged"; }).forEach(function(c){

function renderWeekCellSheet(){
  var d = SHEET.draft || {};
  var c = DB.cases.find(function(item){ return item.id === d.caseId; });
  var rows = [];
  if (c) {
    cloneArr(c.next).filter(function(item){ return item.due === d.date; }).forEach(function(item){
      rows.push('<div class="lineitem"><span class="badge">' + esc(DB.config.labels.next) + '</span><div class="linegrow"><div class="text">' + esc(item.text) + '</div></div><button class="iconbtn" onclick="deleteNext(\'' + esc(d.caseId) + '\',\'' + esc(item.id) + '\');renderSheet()">\u00d7</button></div>');
    });
    cloneArr(c.pendings).filter(function(item){ return item.backOn === d.date; }).forEach(function(item){
      rows.push('<div class="lineitem"><span class="badge">' + esc(DB.config.labels.pending) + '</span><div class="linegrow"><div class="text">' + esc(item.text) + '</div></div><button class="iconbtn" onclick="deletePending(\'' + esc(d.caseId) + '\',\'' + esc(item.id) + '\');renderSheet()">\u00d7</button></div>');
    });
    var todayIso = todayISO();
    cloneArr(c.todos).filter(function(item){
      // Same visibility rule as the grid marker (buildWeekGrid): today's cell
      // carries every undone rolled-over todo, future cells their own day only.
      if (!item || item.done) return false;
      return d.date === todayIso ? item.createdOn <= todayIso : (d.date > todayIso && item.createdOn === d.date);
    }).forEach(function(item){
      rows.push('<div class="lineitem"><span class="badge">' + esc(DB.config.labels.today) + '</span><div class="linegrow"><div class="text">' + esc(item.text) + '</div></div><button class="iconbtn" onclick="deleteTodo(\'' + esc(d.caseId) + '\',\'' + esc(item.id) + '\');renderSheet()">\u00d7</button></div>');
    });
    cloneArr(c.chart && c.chart.items).forEach(function(item){
      if (!item) return;
      var cat = chartCatById(item.catId);
      var catName = cat ? cat.name : "";
      if (item.kind === "event" && item.date === d.date) {
        rows.push('<div class="lineitem"><span class="badge">' + esc(catName) + '</span><div class="linegrow"><div class="text">' + esc(item.name) + '</div></div>' +
          '<button class="iconbtn" onclick="toggleEventDone(\'' + esc(d.caseId) + '\',\'' + esc(item.id) + '\');renderSheet()">' + (item.status === "done" ? '\u2713' : '\u25a1') + '</button>' +
          '<input class="date" type="date" value="' + esc(item.date) + '" onchange="rescheduleChartEntry(\'' + esc(d.caseId) + '\',\'' + esc(item.id) + '\',\'\',this.value);renderSheet()">' +
          '<button class="iconbtn" onclick="removeChartItem(\'' + esc(d.caseId) + '\',\'' + esc(item.id) + '\');renderSheet()">\u00d7</button></div>');
      }
      if (item.kind === "value" && isObj(item.planned) && item.planned[d.date]) {
        var entered = !!(isObj(item.values) && item.values[d.date]);
        rows.push('<div class="lineitem"><span class="badge">' + esc(catName) + '</span><div class="linegrow"><div class="text">\u25c7' + esc(item.name) + '</div><div class="faint">' + esc(entered ? STR.markDone : STR.planBadge) + '</div></div>' +
          '<input class="date" type="date" value="' + esc(d.date) + '" onchange="rescheduleChartEntry(\'' + esc(d.caseId) + '\',\'' + esc(item.id) + '\',\'' + esc(d.date) + '\',this.value);renderSheet()">' +
          '<button class="iconbtn" onclick="cancelValuePlan(\'' + esc(d.caseId) + '\',\'' + esc(item.id) + '\',\'' + esc(d.date) + '\');renderSheet()">\u00d7</button></div>');
      }
    });
  }
  var chips = [
    { key:"next", label:DB.config.labels.next },
    { key:"pending", label:DB.config.labels.pending },
    { key:"todo", label:DB.config.labels.today }
  ];
  cloneArr(DB.config.chartCats).forEach(function(cat){
    if (cat.kind === "event" || cat.kind === "value") chips.push({ key:"cat:" + cat.id, label:cat.name });
  });
  var bandChips = cloneArr(DB.config.chartCats).filter(function(cat){ return cat.kind === "band"; }).map(function(cat){
    return '<button class="chipbtn" onclick="openChartItemForDate(\'' + esc(d.caseId) + '\',\'' + esc(cat.id) + '\',\'' + esc(d.date) + '\')">' + esc(cat.name) + '\u2026</button>';
  }).join('');
  var active = d.itemType || "next";
  return '<div class="sheetcard"><div class="sheettitle">' + esc((c ? c.label + " " : "") + (d.date || "")) + '</div><div class="stack">' +
    '<div class="chips">' + chips.map(function(chip){
      return '<button class="chipbtn' + (active === chip.key ? ' on' : '') + '" onclick="setCellDraftType(\'' + esc(chip.key) + '\')">' + esc(chip.label) + '</button>';
    }).join('') + bandChips + '</div>' +
    '<div class="row"><input id="weekCellInput" class="input" value="' + esc(d.text || "") + '" oninput="sheetDraftValue(\'text\',this.value)" onkeydown="if(event.key===\'Enter\'&&!event.isComposing){addCellItem(\'' + esc(d.caseId) + '\',\'' + esc(d.date) + '\')}"><button class="ghostbtn" onclick="addCellItem(\'' + esc(d.caseId) + '\',\'' + esc(d.date) + '\')">+</button></div>' +
    '<div class="plain">' + (rows.length ? rows.join('') : '<div class="faint">-</div>') + '</div><button class="ghostbtn" onclick="closeSheet()">' + esc(STR.cancel) + '</button></div></div>';

function chartEventMarkClass(item, today){
  if (item.status !== "planned") return "evdone";
  return item.date < today ? "overdue" : "evplan";
}

function chartEventMarkText(item){
  var head = item.status === "done" ? "✓" : (item.date < todayISO() ? "⚠" : "□");
  return head + (String(item.name || '').slice(0, 2) || '●');
}

function renderChartEventDots(items, date, today){
  var hits = cloneArr(items).filter(function(item){ return item && item.date === date; });
  if (!hits.length) return '';
  return hits.slice(0, 2).map(function(item){
    return '<span class="mark ' + esc(chartEventMarkClass(item, today)) + '">' + esc(chartEventMarkText(item)) + '</span>';
  }).join('') + (hits.length > 2 ? '<span class="mark">+' + (hits.length - 2) + '</span>' : '');
}

function renderChartPanel(c){
  var open = !!VIEW.chartOpen;
  var head = '<div class="collapsehead" onclick="toggleChartPanel()"><div class="one">' + esc(STR.chartPanel) + '</div><div class="meta">' + (open ? '-' : '+') + '</div></div>';
  if (!open) return '<section class="panelcard">' + head + '</section>';
  var today = todayISO();
  var dates = chartDates(c, today);
  var marks = chartColMarks(c);
  var groups = chartRowsForCase(c, DB.config.chartCats).filter(function(group){
    return group.orphan || !chartCatHidden(group.cat.id);
  });
  // Two fixed header rows (D-number + M/D) - the paper 温度板's 病日+暦日 pair.
  // The old tap-toggle (chartDateMode) is gone by design decision.
  var headRow = '<tr><th class="sticky"></th>' + dates.map(function(date){
    return '<th class="' + (date === today ? 'todaycol' : '') + '">D' + computeDay(c.admittedAt, date) + '</th>';
  }).join('') + '</tr><tr><th class="sticky"></th>' + dates.map(function(date){
    return '<th class="' + (date === today ? 'todaycol' : '') + '">' + esc(Number(date.slice(5, 7)) + '/' + Number(date.slice(8, 10))) + '<span class="colmark">' + (marks[date] ? esc(marks[date]) : '&nbsp;') + '</span></th>';
  }).join('') + '</tr>';
  var body = groups.map(function(group){
    var cat = group.cat;
    var groupKey = cat.id || "orphan";
    var collapsed = chartGroupCollapsed(c.id, groupKey);
    var addBtn = group.orphan ? '' : (cat.kind === "event"
      ? ' <button class="smallbtn" onclick="event.stopPropagation();openChartEventCell(\'' + esc(c.id) + '\',\'' + esc(cat.id) + '\',\'' + esc(today) + '\')">＋</button>'
      : ' <button class="smallbtn" onclick="event.stopPropagation();openChartItem(\'' + esc(c.id) + '\',\'' + esc(cat.id) + '\',\'\')">＋</button>');
    var headerRow = '<tr><th class="sticky catrow" onclick="toggleChartGroup(\'' + esc(c.id) + '\',\'' + esc(groupKey) + '\')"><span class="dot" style="display:inline-block;background:' + esc(cat.color) + '"></span> ' + esc(cat.name) + ' ' + (collapsed ? '+' : '-') + addBtn + '</th><td colspan="' + dates.length + '"></td></tr>';
    if (collapsed) return headerRow;
    var rows = '';
    if (!group.orphan && cat.kind === "event") {
      rows = group.items.length ? '<tr><th class="sticky chartlabel"></th>' + dates.map(function(date){
        return '<td class="' + (date === today ? 'todaycol' : '') + '" onclick="openChartEventCell(\'' + esc(c.id) + '\',\'' + esc(cat.id) + '\',\'' + esc(date) + '\')">' + renderChartEventDots(group.items, date, today) + '</td>';
      }).join('') + '</tr>' : '';
    } else {
      rows = group.items.map(function(item){
        var labelTh = '<th class="sticky chartlabel" onclick="openChartItem(\'' + esc(c.id) + '\',\'' + esc(item.catId) + '\',\'' + esc(item.id) + '\')">' + esc((item.name || '-').slice(0, 4)) + '</th>';
        if (item.kind === "band") {
          return '<tr>' + labelTh + dates.map(function(date){
            return '<td class="bandcell' + (date === today ? ' todaycol' : '') + '">' + (bandOnDate(item, date) ? '<div class="band" style="background:' + esc(cat.color) + '"></div>' : '') + '</td>';
          }).join('') + '</tr>';
        }
        if (item.kind === "event") {
          return '<tr>' + labelTh + dates.map(function(date){
            return '<td class="' + (date === today ? 'todaycol' : '') + '">' + (item.date === date ? '<span class="mark ' + esc(chartEventMarkClass(item, today)) + '">' + esc(chartEventMarkText(item)) + '</span>' : '') + '</td>';
          }).join('') + '</tr>';
        }
        return '<tr>' + labelTh + dates.map(function(date){
          var val = (item.values && item.values[date]) || '';
          var plannedHere = !val && isObj(item.planned) && item.planned[date];
          var planMark = plannedHere ? '<span class="mark ' + (date < today ? 'overdue' : 'evplan') + '">' + (date < today ? '⚠' : '◇') + '</span>' : '';
          return '<td class="' + (date === today ? 'todaycol' : '') + '" onclick="openChartValue(\'' + esc(c.id) + '\',\'' + esc(item.id) + '\',\'' + esc(date) + '\')">' + (val ? esc(val) : planMark) + '</td>';
        }).join('') + '</tr>';
      }).join('');
    }
    return headerRow + rows;
  }).join('');
  return '<section class="panelcard">' + head + '<div class="chartwrap" style="margin-top:10px"><table class="chartgrid"><thead>' + headRow + '</thead><tbody>' + body + '</tbody></table></div></section>';
}

renderBoard = function(){
  var cases = boardCases();
  var body;
  if (VIEW.boardMode === "week") {
    var week = buildWeekGrid(DB.cases, todayISO(), VIEW.weekPast, VIEW.weekFuture);
    body = '<div id="weekWrap" class="weekwrap"><table class="weekgrid"><thead><tr><th class="sticky">' + esc(STR.weekCaseCol) + '</th>' + week.dates.map(function(date){
      return '<th class="' + esc(weekHeaderClass(date, week.today)) + '" onclick="openDayView(\'' + esc(date) + '\')">' + esc(weekHeaderLabel(date)) + '</th>';
    }).join('') + '</tr></thead><tbody>' + week.rows.map(function(row){
      return '<tr><th class="sticky casecell" onclick="openDetail(\'' + esc(row.case.id) + '\')">' + esc(row.case.label) + ' D' + computeDay(row.case.admittedAt, todayISO()) + '</th>' + week.dates.map(function(date){
        var cell = row.dates[date];
        var bandColor = cell.stageId ? stageById(cell.stageId).color : "transparent";
        // Chart projections share the marker stack: overdue first (today only),
        // then planned/done events, value plans, then the classic markers.
        var marks = [];
        cloneArr(cell.overdue).forEach(function(o){ marks.push({ cls:"overdue", text:"⚠" + String(o.name || "").slice(0, 2) }); });
        cloneArr(cell.events).forEach(function(ev){ marks.push({ cls:ev.status === "done" ? "evdone" : "evplan", text:(ev.status === "done" ? "✓" : "□") + String(ev.name || "").slice(0, 2) }); });
        cloneArr(cell.plans).forEach(function(p){ marks.push({ cls:p.entered ? "evdone" : "evplan", text:"◇" + String(p.name || "").slice(0, 2) }); });
        cell.markers.forEach(function(marker){ marks.push({ cls:"", text:marker.text }); });
        var bandBits = cloneArr(cell.bands).slice(0, 3).map(function(b){
          var cat = chartCatById(b.catId);
          return '<span class="bandbit" style="background:' + esc((cat && cat.color) || "#64748b") + '"></span>';
        }).join('');
        return '<td class="' + (date === week.today ? 'todaycol' : '') + '" onclick="openWeekCell(\'' + esc(row.case.id) + '\',\'' + esc(date) + '\')"><div class="weekband" style="background:' + esc(bandColor) + '"></div><div class="markerstack">' + marks.slice(0, 5).map(function(marker){
          return '<span class="mark' + (marker.cls ? ' ' + marker.cls : '') + '">' + esc(marker.text) + '</span>';
        }).join('') + (marks.length > 5 ? '<span class="mark">+' + (marks.length - 5) + '</span>' : '') + '</div>' + (bandBits ? '<div class="bandrow">' + bandBits + '</div>' : '') + '</td>';
      }).join('') + '</tr>';
    }).join('') + '</tbody></table></div>';
  } else if (VIEW.boardMode === "day") {
    body = renderDayPlanView();
  } else {
    body = cases.length ? '<div class="list' + (boardDensityCompact() ? ' compact' : '') + '">' +
      cases.map(function(c, idx){
        return '<div class="dropzone" data-drop-index="' + idx + '"></div>' + renderBoardCard(c);
      }).join('') +
      '<div class="dropzone" data-drop-index="' + cases.length + '"></div>' +
    '</div>' : '<div class="empty">' + esc(STR.emptyBoard) + '</div>';
  }
  return '<section class="screen"><div class="seg"><button class="chipbtn' + (VIEW.boardMode !== "week" && VIEW.boardMode !== "day" ? ' on' : '') + '" onclick="setBoardMode(\'board\')">' + esc(STR.boardView) + '</button><button class="chipbtn' + (VIEW.boardMode === "day" ? ' on' : '') + '" onclick="setBoardMode(\'day\')">' + esc(STR.dayView) + '</button><button class="chipbtn' + (VIEW.boardMode === "week" ? ' on' : '') + '" onclick="setBoardMode(\'week\')">' + esc(STR.weekView) + '</button>' + (VIEW.boardMode !== "week" && VIEW.boardMode !== "day" ? '<div class="grow"></div><button class="chipbtn densitytoggle' + (boardDensityCompact() ? ' on' : '') + '" onclick="toggleDensity()">' + esc(STR.densityCompact) + '</button>' : '') + '</div>' + body +
  '</section><div class="bottom"><div class="bottomin"><div class="bottomrow"><button class="primary" onclick="openAdmissionSheet()">' + esc(STR.addAdmission) + '</button><button class="ghostbtn" onclick="openReview()">' + esc(STR.review) + '</button></div><div class="row wrap" style="margin-top:8px"><button class="ghostbtn smallbtn" onclick="openSyncSheet()"><span data-sync-status>' + esc(syncStatusLabel()) + '</span></button><button class="ghostbtn smallbtn" onclick="openDataSheet()">' + esc(STR.dataRow) + '</button><button class="ghostbtn smallbtn" onclick="openSearch()">' + esc(STR.searchRow) + '</button><button class="ghostbtn smallbtn" onclick="openSettingsSheet()">' + esc(STR.settingsRow) + '</button></div></div></div>';
};

    (dischargeOpen ? '<div class="stack" style="margin-top:10px"><div class="row wrap"><span class="fieldlabel">' + esc(STR.plannedOn) + '</span><input class="date" type="date" value="' + esc(c.discharge.plannedOn || '') + '" onchange="mutateCase(\'' + esc(c.id) + '\',function(row){row.discharge.plannedOn=this.value||null}.bind(this))"></div><div class="checklist">' + dcChecklistItems().map(function(item){
      return '<label class="checkitem"><input class="check" type="checkbox" ' + (c.discharge.checklist[item.k] ? 'checked ' : '') + 'onclick="mutateCase(\'' + esc(c.id) + '\',function(row){row.discharge.checklist[\'' + esc(item.k) + '\']=this.checked}.bind(this))"><div class="linegrow"><div class="text">' + esc(item.t) + '</div><div class="faint">' + esc(item.h) + '</div></div></label>';
    }).join('') + '</div><textarea id="dcExportText" class="reviewtextarea hidden" readonly>' + esc(dischargeExportText(c.id)) + '</textarea><div class="row wrap"><button class="ghostbtn" onclick="copyDischargeExport(\'' + esc(c.id) + '\')">' + esc(STR.dcExport) + '</button>' + (c.status === "discharged" ? '<button class="ghostbtn" onclick="undischargeCase(\'' + esc(c.id) + '\')">' + esc(STR.backToActive) + '</button>' : '<button class="ghostbtn danger" onclick="dischargeCase(\'' + esc(c.id) + '\')">' + esc(STR.doDischarge) + '</button>') + '</div></div>' : '') + '</section>';
  return '<section class="screen detail"><div class="stack">' +
    '<section class="panelcard"><div class="detailhead"><div class="linegrow">' +
      (VIEW.editingLabel ? '<input class="editline" value="' + esc(c.label) + '" onblur="setViewEditingLabel(false);updateCaseLabel(\'' + esc(c.id) + '\',this.value)" onkeydown="if(event.key===\'Enter\'&&!event.isComposing){this.blur()}">' : '<div class="caseid one" onclick="setViewEditingLabel(true)">' + esc(c.label || '-') + '</div>') +
      '<div class="meta" onclick="setViewEditingMeta(' + (!VIEW.editingMeta ? 'true' : 'false') + ')">D' + computeDay(c.admittedAt, todayISO()) + ' ' + esc(compactMeta(c)) + (c.discharge.plannedOn ? ' / ' + esc(STR.plannedOn) + ' ' + esc(c.discharge.plannedOn.slice(5)) : '') + '</div>' +
      (c.status === "discharged" ? '<div class="subtleline">' + esc(STR.dischargedAtLine + ' ' + (c.dischargedAt || '')) + '</div>' : '') +
      (VIEW.editingMeta ? renderMetaEditor(c) : '') +
    '</div><button class="pickbtn" onclick="openStagePicker(\'' + esc(c.id) + '\')">' + stageDot(stage) + esc(stage.name) + '</button></div>' +
    '<div class="field" style="margin-top:10px"><div class="fieldlabel">' + esc(STR.addDxTag) + '</div>' + renderTagList(c) + '<div class="row" style="margin-top:8px"><input id="dxTagInput" class="input" placeholder="' + esc(STR.dxTagPh) + '" onkeydown="if(event.key===\'Enter\'&&!event.isComposing){addDxTag(\'' + esc(c.id) + '\',this.value);this.value=\'\'}"><button class="ghostbtn" onclick="addDxTag(\'' + esc(c.id) + '\',document.getElementById(\'dxTagInput\').value);document.getElementById(\'dxTagInput\').value=\'\'">+</button></div></div></section>' +
    '<section class="panelcard sec-phase"><div class="one">' + esc(DB.config.labels.phase) + '</div><div class="field" style="margin-top:10px"><input class="input" value="' + esc(c.phaseNote) + '" placeholder="' + esc(STR.firstNotePh) + '" onblur="updateCasePhase(\'' + esc(c.id) + '\',this.value)" onkeydown="if(event.key===\'Enter\'&&!event.isComposing){this.blur()}"></div></section>' +
    (dischargeInline ? dischargePanel : '') +
    renderSectionCard(DB.config.labels.next, renderNextList(c), "nextInput", STR.nextPh, "addNext", c.id, "sec-next") +
    renderSectionCard(DB.config.labels.today, renderTodoList(c), "todoInput", STR.todayPh, "addTodo", c.id, "sec-today") +
    renderSectionCard(DB.config.labels.pending, renderPendingList(c), "pendingInput", STR.pendingPh, "addPending", c.id, "sec-pending") +
    renderSectionCard(DB.config.labels.seeds, renderSeedList(c), "seedInput", STR.seedPh, "addSeed", c.id, "sec-seeds") +
    renderChartPanel(c) +
    (!dischargeInline ? dischargePanel : '') +
    '<section class="panelcard"><textarea id="dayExportText" class="reviewtextarea hidden" readonly>' + esc(dayExportText(c.id)) + '</textarea><button class="ghostbtn" onclick="copyDayExport(\'' + esc(c.id) + '\')">' + esc(STR.dayExport) + '</button></section>' +
    '<section class="panelcard"><button class="ghostbtn danger" onclick="deleteCase(\'' + esc(c.id) + '\')">' + esc(STR.deleteCase) + '</button></section>' +
  '</div></section>';
};

renderReviewDone = function(){
  var count = countSeedsOn(DB.cases, todayISO());
  var pendingSeeds = unsentSeeds(DB.cases);
  var exportText = formatSeedExport(pendingSeeds, todayISO());
  var streak = reviewStreak(STATS && STATS.reviewDates, todayISO());
  return '<section class="screen"><div class="stack"><section class="panelcard"><div class="one">' + esc(STR.reviewDone) + '</div>' +
    (REVIEW.empty ? '<div class="phase">' + esc(STR.reviewEmpty) + '</div>' : '') +
    '<div class="phase">' + esc(STR.seedsToday) + ' ' + count + '件</div><div class="phase">' + esc(STR.streakLine) + ' ' + streak + '日 ・ ' + esc(STR.seedsTotal) + ' ' + toNum(STATS && STATS.seedsCaptured, 0) + '</div><div class="phase" data-outbox-status>' + esc(REVIEW.outboxStatus || "") + '</div>' +
    (pendingSeeds.length ? '<div class="stack" style="margin-top:10px"><textarea id="reviewExportText" class="reviewtextarea" readonly rows="8">' + esc(exportText) + '</textarea><div class="bottomrow"><button class="ghostbtn" onclick="copyReviewExport()">' + esc(REVIEW.copied ? STR.copied : STR.copyExport) + '</button>' + ((typeof navigator !== "undefined" && navigator.share) ? '<button class="ghostbtn" onclick="shareReviewExport()">' + esc(STR.shareExport) + '</button>' : '') + '</div></div>' : '<div class="phase">' + esc(STR.noUnsentSeeds) + '</div>') +
    '</section><button class="primary" onclick="openBoard()">' + esc(STR.backToBoard) + '</button></div></section>';
};

renderSheet = function(){
  var el = document.getElementById("sheet");
  if (!el) return;
  var renderers = {
    admission:renderAdmissionSheet, stage:renderStageSheet, sync:renderSyncSheet,
    data:renderDataSheet, settings:renderSettingsSheet, weekCell:renderWeekCellSheet,
    chartItem:renderChartItemSheet, chartValue:renderChartValueSheet, chartEventCell:renderChartEventCellSheet
  };
  var html = renderers[SHEET.name] ? renderers[SHEET.name]() : "";
  el.className = "sheet" + (html ? " open" : "");
  el.innerHTML = html;
};

function render(){
  ensureToday();
  var app = document.getElementById("app");
  if (!app) return "";
  var body = VIEW.name === "detail" ? renderDetail(VIEW.caseId) : VIEW.name === "review" ? renderReview() : VIEW.name === "search" ? renderSearch() : renderBoard();
  var html = renderTopbar() + body;
  app.innerHTML = html;
  renderSheet();
  ensureWeekWrapBehavior();
  syncOrientationLock();
  flushQueuedFocus();
  return html;
}

function boot(){
  try { history.replaceState({ wb:0 }, ""); } catch (e) {}
  STATS = loadStats();
  SETTINGS = loadSettings();
  THEME_MODE = loadThemeMode();
  applyTheme();
  ensureStatsBootDay();
  SYNC = loadSync();
  setSyncStatus(SYNC && SYNC.enabled ? "idle" : "off");
  DB = loadState();
  DB._configMt = JSON.parse(JSON.stringify((SYNC && SYNC.state && SYNC.state.configMt) || {}));
  applyDailyRollover(false);
  render();
  if (SYNC && SYNC.enabled) {
    setTimeout(function(){ syncNow(); }, 0);
    setTimeout(function(){ syncSendOutboxIfNeeded("boot"); }, 0);
  }
  try {
    if (typeof matchMedia === "function") matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function(){ if (THEME_MODE === "os") applyTheme(); });
  } catch (e) {}
  try {
    if (typeof navigator !== "undefined" && navigator.serviceWorker && navigator.serviceWorker.register && typeof document !== "undefined" && document.createElement) {
      navigator.serviceWorker.register("./sw.js").catch(function(){});
    }
  } catch (e) {}
}

if (typeof document !== "undefined" && document.addEventListener) {
  document.addEventListener("visibilitychange", function(){
    if (!document.visibilityState || document.visibilityState === "visible") ensureToday();
  });
  document.addEventListener("pointermove", dragMove);
  document.addEventListener("pointerup", dragEnd);
  document.addEventListener("pointercancel", cancelDrag);
}
if (typeof window !== "undefined" && window.addEventListener) {
  window.addEventListener("popstate", handlePopState);
  // A failed sync schedules no retry of its own; coming back online is the
  // natural moment to flush whatever is still dirty.
  window.addEventListener("online", function(){ queueSync(); });
  // Re-render the week window only on a WIDTH change (rotation / real resize).
  // The soft keyboard fires resize by shrinking HEIGHT only; re-rendering then
  // would destroy the focused input and dismiss the keyboard mid-typing.
  LAST_WIN_WIDTH = (typeof window !== "undefined" && window.innerWidth) || 0;
  window.addEventListener("resize", debounce(function(){
    var w = (typeof window !== "undefined" && window.innerWidth) || 0;
    if (w === LAST_WIN_WIDTH) return;
    LAST_WIN_WIDTH = w;
    if (VIEW.name === "board" && VIEW.boardMode === "week") {
      VIEW.weekPast = 0;
      VIEW.weekFuture = weekDefaultFuture();
      WEEK_SCROLL_RT.initPending = true;
      render();
    }
  }, 250));
}

boot();
</script>
</body>
</html>
