<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5f6f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Wardbook">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="icon" type="image/png" href="./icons/icon-192.png">
<title>Wardbook</title>
<style>
  :root{
    color-scheme:light;
    --bg:#f5f6f8;
    --card:#ffffff;
    --panel:#eef1f4;
    --line:#d7dce2;
    --text:#17202a;
    --muted:#5f6b78;
    --soft:#8a95a3;
    --accent:#111827;
    --danger:#b91c1c;
    --danger-soft:#fee2e2;
    --ok:#166534;
    --ok-soft:#dcfce7;
    --badge:#fff7ed;
    --badge-line:#fdba74;
    --btn:#ffffff;
    --on-accent:#fff;
    --bar:rgba(245,246,248,.96);
    --drop:rgba(17,24,39,.14);
    --shadow:0 1px 2px rgba(0,0,0,.06);
    --weekend-sun:#b44a4a;
    --weekend-sat:#4f6fb8;
    --sec-phase:#6d28d9;
    --sec-next:#1d4ed8;
    --sec-today:#15803d;
    --sec-pending:#b45309;
    --sec-seeds:#be185d;
  }
  :root[data-theme="dark"]{
    color-scheme:dark;
    --bg:#13161a;
    --card:#1b2128;
    --panel:#232b33;
    --line:#354150;
    --text:#edf2f7;
    --muted:#b2bcc7;
    --soft:#8e99a6;
    --accent:#e5e7eb;
    --danger-soft:#3a1f23;
    --ok-soft:#173327;
    --badge:#342516;
    --badge-line:#855f38;
    --btn:#232b33;
    --on-accent:#13161a;
    --bar:rgba(19,22,26,.96);
    --drop:rgba(237,242,247,.22);
    --shadow:0 1px 2px rgba(0,0,0,.28);
    --weekend-sun:#f09a9a;
    --weekend-sat:#9db8ff;
    --sec-phase:#c4b5fd;
    --sec-next:#93c5fd;
    --sec-today:#86efac;
    --sec-pending:#fbbf6e;
    --sec-seeds:#f9a8d4;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;
    font:14px/1.4 system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic UI",sans-serif;
    color:var(--text);
    background:var(--bg);
  }
  button,input{font:inherit}
  button{cursor:pointer}
  .app{max-width:720px;margin:0 auto;padding:0 0 88px}
  .topbar{
    position:sticky;top:0;z-index:20;
    background:var(--bar);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-top));
  }
  .toprow{display:flex;align-items:center;gap:8px}
  .title{font-size:13px;font-weight:700;letter-spacing:.04em}
  .grow{flex:1}
  .screen{padding:12px}
  .list{display:flex;flex-direction:column;gap:10px}
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-left:4px solid var(--line);
    border-radius:14px;
    box-shadow:var(--shadow);
    padding:10px;
  }
  .card.dragging{opacity:.72}
  .cardhead{display:flex;gap:8px;align-items:flex-start}
  .handle,.iconbtn,.ghostbtn,.chipbtn,.pickbtn,.smallbtn,.primary{
    border:1px solid var(--line);
    background:var(--btn);
    color:var(--text);
    border-radius:10px;
    min-height:36px;
  }
  .handle{width:36px;min-width:36px;padding:0;touch-action:none}
  .iconbtn{width:36px;padding:0}
  .primary{
    background:var(--accent);
    border-color:var(--accent);
    color:var(--on-accent);
    font-weight:700;
    padding:0 14px;
  }
  .ghostbtn,.smallbtn,.pickbtn{padding:0 12px}
  .smallbtn{min-height:32px;font-size:12px}
  .chipbtn{
    min-height:34px;
    padding:0 12px;
    font-size:12px;
    white-space:nowrap;
    flex-shrink:0;
  }
  .chipbtn.on{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
  .labelrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .caseid{font-weight:700;font-size:16px}
  .meta{color:var(--muted);font-size:12px}
  .stagechip{
    display:inline-flex;align-items:center;gap:6px;
    border:1px solid var(--line);
    background:var(--btn);
    border-radius:999px;
    padding:3px 8px;
    font-size:12px;
    white-space:nowrap;
  }
  .dot{width:9px;height:9px;border-radius:50%}
  .phase{margin-top:6px;color:var(--muted)}
  .section{margin-top:8px}
  .sec-phase{--sec:var(--sec-phase)}
  .sec-next{--sec:var(--sec-next)}
  .sec-today{--sec:var(--sec-today)}
  .sec-pending{--sec:var(--sec-pending)}
  .sec-seeds{--sec:var(--sec-seeds)}
  .sectiontitle{font-size:11px;font-weight:700;color:var(--sec,var(--soft));text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
  .phase.sec-phase{border-left:3px solid var(--sec-phase);padding-left:8px}
  .panelcard>.one{color:var(--sec,inherit)}
  .compactcounts span{color:var(--sec,inherit)}
  .plain{display:flex;flex-direction:column;gap:4px}
  .lineitem{
    display:flex;gap:8px;align-items:flex-start;
    padding:7px 8px;border-radius:10px;background:var(--panel);
  }
  .lineitem.sent{opacity:.6}
  .linegrow{flex:1;min-width:0}
  .text{word-break:break-word}
  .faint{color:var(--soft);font-size:12px}
  .badge{
    display:inline-flex;align-items:center;justify-content:center;
    min-height:22px;padding:0 8px;border:1px solid var(--badge-line);
    background:var(--badge);border-radius:999px;font-size:11px;font-weight:700;
  }
  .seedcount{color:var(--sec,var(--muted));font-size:12px}
  .list.compact{gap:6px}
  .card.compact{padding:6px 8px}
  .card.compact .caseid{font-size:14px}
  .card.compact .handle{min-height:28px;width:28px;min-width:28px}
  .card.compact .phase{margin-top:2px;font-size:12px}
  .oneline{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .compactline{display:flex;gap:6px;align-items:baseline;min-width:0;margin-top:2px;font-size:12px}
  .compactline .text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .compactcounts{color:var(--muted);white-space:nowrap;font-size:11px}

    border:1px dashed var(--line);
    border-radius:14px;
    background:var(--card);
    color:var(--muted);
    text-align:center;

    background:var(--bar);
    backdrop-filter:blur(8px);
    border-top:1px solid var(--line);

  .bottom .primary{width:100%;min-height:44px}
  .detailhead,.row,.field,.chips,.inline{display:flex;gap:8px}
  .detailhead{align-items:flex-start;flex-wrap:wrap}
  .stack{display:flex;flex-direction:column;gap:12px}
  .panelcard{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px;
    box-shadow:var(--shadow);
  }
  .row{align-items:center}
  .row.wrap,.inline,.chips{flex-wrap:wrap}
  .field{flex-direction:column}
  .fieldlabel{font-size:12px;color:var(--muted);font-weight:700}
  .input,.date,.editline{
    width:100%;
    min-height:38px;
    border:1px solid var(--line);
    border-radius:10px;
    background:var(--btn);
    color:var(--text);
    padding:8px 10px;
  }
  .date{width:auto}
  .editline{font-weight:700;font-size:18px}
  .one{font-size:16px;font-weight:700}
  .subedit{font-size:13px}
  .check{
    width:20px;height:20px;margin-top:2px;

  }
  .danger{
    border-color:#fecaca;
    background:var(--danger-soft);

  .sheet{
    position:fixed;inset:0;z-index:40;
    background:rgba(15,23,42,.28);
    display:none;
    align-items:flex-end;
    justify-content:center;
    padding:12px;

  .sheet.open{display:flex}
  .sheetcard{
    width:min(720px,100%);
    max-height:88vh;
    overflow:auto;
    background:var(--card);
    border-radius:18px 18px 0 0;
    padding:14px;

  }

  .bottomrow{display:flex;gap:8px}

  .reviewactions,.reviewstack{display:flex;flex-direction:column;gap:8px}
  .reviewactions button,.reviewstack button{width:100%;min-height:44px}
  .reviewtextarea{width:100%;min-height:160px;border:1px solid var(--line);border-radius:10px;background:var(--btn);color:var(--text);padding:10px;resize:vertical}
  .missrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px}
  .missrow .input{flex:1 1 180px}
  .hidden{display:none!important}
  .seg{display:flex;gap:6px;margin-bottom:10px}
  .seg button{flex:1}
  .seg .densitytoggle{flex:0 0 auto}
  .searchbar,.filters{display:flex;gap:8px;flex-wrap:wrap}
  .searchbar input,.filters select{flex:1}
  .weekwrap,.chartwrap{overflow:auto}
  .weekgrid,.chartgrid{border-collapse:separate;border-spacing:0;min-width:max-content}
  .weekgrid th,.weekgrid td,.chartgrid th,.chartgrid td{
    border:1px solid var(--line);
    background:var(--card);
    min-width:28px;
    padding:4px;
    font-size:11px;
    text-align:center;
    vertical-align:middle;
  }
  /* Taller, wider week rows: more room to stack markers per patient/day. */
  .weekgrid td{min-height:46px;height:46px;padding:5px 6px;font-size:12px;vertical-align:top}
  .weekgrid tbody .sticky{font-size:13px;font-weight:600}
  .weekgrid .sticky,.chartgrid .sticky{
    position:sticky;
    left:0;
    z-index:2;
    min-width:110px;
    text-align:left;
    background:var(--card);
  }
  .chartgrid .sticky{min-width:72px;max-width:110px;overflow:hidden}
  .weekgrid th,.weekgrid td{min-width:44px}
  .weekgrid .sticky{min-width:76px;max-width:120px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .weekgrid thead th{cursor:pointer}
  .weekgrid thead .sticky{cursor:default}
  .weekgrid .casecell{cursor:pointer}
  .weekgrid .suncol{color:var(--weekend-sun)}
  .weekgrid .satcol{color:var(--weekend-sat)}
  .weekgrid .todaycol,.chartgrid .todaycol{background:var(--panel)}
  .mark.evplan{font-weight:600}
  .mark.evdone{opacity:.5}
  .mark.overdue{color:#dc2626;font-weight:700}
  .bandrow{display:flex;gap:2px;height:3px;margin-top:2px}
  .bandbit{flex:1;border-radius:2px;opacity:.45}
  .overdueblock{border:1px solid #dc2626;border-radius:8px;padding:8px;margin-bottom:8px}
  .overdueblock .fieldlabel{color:#dc2626}
  .daynav{display:flex;gap:8px;align-items:center;margin-bottom:10px}
  .daynavdate{flex:1;text-align:center;font-weight:700}
  .daygroup{margin-top:12px}
  .daygroup .dayhead{cursor:pointer}
  .daygroup .plain{margin-top:6px}
  .chartlabel{white-space:nowrap;font-weight:400;cursor:pointer}
  .catrow{cursor:pointer;white-space:nowrap}
  .colmark{display:block;font-size:9px;color:var(--muted);font-weight:700;min-height:11px}
  .bandcell{position:relative;height:22px}
  .band{
    position:absolute;
    left:2px;
    right:2px;
    top:6px;
    height:10px;
    border-radius:999px;
    opacity:.72;
  }
  .weekband{height:12px;border-radius:999px}
  .markerstack{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-top:3px}
  .mark{display:inline-flex;min-width:18px;height:18px;padding:0 4px;border-radius:999px;align-items:center;justify-content:center;background:var(--panel);font-size:11px}
  .collapsehead{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .subtleline{font-size:12px;color:var(--muted);margin-top:6px}
  .checklist{display:flex;flex-direction:column;gap:6px}
  .checkitem{display:flex;gap:8px;align-items:flex-start;padding:6px 8px;border-radius:10px;background:var(--panel)}
  .settingssec{border-top:1px solid var(--line);padding-top:10px}
  @media (min-width:860px){
    .app{max-width:920px}
    .screen.detail{display:grid;grid-template-columns:minmax(0,1fr);gap:12px}
    .bottomin{max-width:920px}
  }
</style>

<body>
<div id="app" class="app"></div>
<div id="sheet" class="sheet"></div>
<script id="logic">
function defaultStages(){
  return [
    { id:"adm", name:"入院直後", color:"#8b5cf6" },
    { id:"acute", name:"急性期", color:"#ef4444" },
    { id:"stall", name:"停滞・悪化", color:"#f97316" },
    { id:"improv", name:"改善傾向", color:"#eab308" },
    { id:"dc", name:"退院調整", color:"#3b82f6" }
  ];
}

function defaultLabels(){
  return { phase:"Phase", next:"Next", today:"Today", pending:"Pending", seeds:"Seeds" };
}

function isObj(v){
  return !!v && typeof v === "object" && !Array.isArray(v);
}

function cloneArr(v){
  return Array.isArray(v) ? v.slice() : [];
}

function safeDate(v, fallback){
  return typeof v === "string" && /^\d{4}-\d{2}-\d{2}$/.test(v) ? v : fallback;
}

// IDs are interpolated into inline onclick='fn("<id>")' handlers, where esc()
// alone cannot prevent quote-breakout (attribute entities decode before the JS
// parses). Restricting the charset at normalize time - imported backups and
// synced payloads included - is what makes that interpolation injection-proof.
// Every app-generated id (uid / stage- / cat- / next-N ...) already conforms.
function safeId(v){
  return typeof v === "string" && /^[A-Za-z0-9_-]{1,64}$/.test(v) ? v : "";
}

// Colors land in style="background:<color>" - a free-form string could smuggle
// url(...) exfiltration. Hex only; anything else falls back to the default.
function safeColor(v){
  return typeof v === "string" && /^#[0-9a-fA-F]{3,8}$/.test(v) ? v : "";
}

function toNum(v, fallback){
  return Number.isFinite(Number(v)) ? Number(v) : fallback;
}

function normalizeStage(raw, index){
  var d = defaultStages()[index] || defaultStages()[0];
  var src = isObj(raw) ? raw : {};
  return {
    id: safeId(src.id) || d.id,
    name: typeof src.name === "string" && src.name ? src.name : d.name,
    color: safeColor(src.color) || d.color
  };
}

function normalizeLabels(raw){
  var base = defaultLabels();
  var out = {};
  var src = isObj(raw) ? raw : {};
  Object.keys(base).forEach(function(k){
    out[k] = typeof src[k] === "string" && src[k] ? src[k] : base[k];
  });
  return out;
}

function defaultChartCats(){
  return [
    { id:"cat-vital", name:"バイタル", kind:"value", color:"#ef4444" },
    { id:"cat-med", name:"処方", kind:"band", color:"#16a34a" },
    { id:"cat-inj", name:"注射", kind:"band", color:"#3b82f6" },
    { id:"cat-diet", name:"食事", kind:"band", color:"#f97316" },
    { id:"cat-lab", name:"検査", kind:"value", color:"#8b5cf6" },
    { id:"cat-ic", name:"IC", kind:"event", color:"#eab308" }
  ];
}

function normalizeChartCat(raw, index){
  var d = defaultChartCats()[index] || defaultChartCats()[0];
  var src = isObj(raw) ? raw : {};
  return {
    id: safeId(src.id) || d.id,
    name: typeof src.name === "string" && src.name ? src.name : d.name,
    kind: src.kind === "value" || src.kind === "band" || src.kind === "event" ? src.kind : d.kind,
    color: safeColor(src.color) || d.color
  };
}

// The chart holds a flat item list; each item carries its kind (copied from its
// category at creation) so items whose category was deleted on another device
// can still be rendered and cleaned up instead of silently vanishing.
function normalizeChart(raw){
  var src = isObj(raw) ? raw : {};
  var items = cloneArr(src.items).map(function(entry, idx){
    var row = isObj(entry) ? entry : {};
    if (!safeId(row.catId)) return null;
    var kind = row.kind === "band" || row.kind === "event" ? row.kind : "value";
    var out = {
      id: safeId(row.id) || "chart-" + idx,
      catId: row.catId,
      kind: kind,
      name: typeof row.name === "string" ? row.name : ""
    };
    if (kind === "value") {
      if (!out.name) return null;
      var values = {};
      Object.keys(isObj(row.values) ? row.values : {}).forEach(function(date){
        if (/^\d{4}-\d{2}-\d{2}$/.test(date) && String(row.values[date])) values[date] = String(row.values[date]);
      });
      out.values = values;
      // MAR-style plan marks (SPEC-F): planned[date]=true until a value for
      // that date is entered. Old devices drop this field; accepted (their
      // edits do not propagate during the mixed-version window anyway).
      var planned = {};
      Object.keys(isObj(row.planned) ? row.planned : {}).forEach(function(date){
        if (/^\d{4}-\d{2}-\d{2}$/.test(date) && row.planned[date]) planned[date] = true;
      });
      out.planned = planned;
    } else if (kind === "band") {
      var startDate = safeDate(row.startDate, "");
      if (!startDate || !out.name) return null;
      out.startDate = startDate;
      out.endDate = row.endDate == null ? null : safeDate(row.endDate, null);
    } else {
      var date = safeDate(row.date, "");
      if (!date || !out.name) return null;
      out.date = date;
      // Events default to done: every pre-SPEC-F event was a recorded fact.
      out.status = row.status === "planned" ? "planned" : "done";
    }
    return out;
  }).filter(Boolean);
  return { items: items };
}

function chartDates(c, todayIso){
  var start = safeDate(c && c.admittedAt, todayIso);
  var end = todayIso;
  cloneArr(c && c.chart && c.chart.items).forEach(function(item){
    if (!item) return;
    if (item.startDate && item.startDate > end) end = item.startDate;
    if (item.endDate && item.endDate > end) end = item.endDate;
    if (item.date && item.date > end) end = item.date;
    Object.keys(isObj(item.planned) ? item.planned : {}).forEach(function(d){
      if (d > end) end = d;
    });
  });
  if (c && c.discharge && c.discharge.plannedOn && c.discharge.plannedOn > end) end = c.discharge.plannedOn;
  if (c && c.dischargedAt && c.dischargedAt > end) end = c.dischargedAt;
  var out = [];
  var cur = Date.parse(start + "T00:00:00");
  var max = Date.parse(end + "T00:00:00");
  while (Number.isFinite(cur) && Number.isFinite(max) && cur <= max && out.length < 370) {
    var d = new Date(cur);
    out.push(d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"));
    cur += 86400000;
  }
  return out;
}

function bandOnDate(item, date){
  if (!item || !item.startDate) return false;
  if (date < item.startDate) return false;
  if (item.endDate && date > item.endDate) return false;
  return true;
}

// Admission / discharge / planned-discharge column marks. Not rows on purpose
// (confirmed design decision): they derive from case fields, no hand input.
function chartColMarks(c){
  var marks = {};
  if (c && c.discharge && c.discharge.plannedOn) marks[c.discharge.plannedOn] = "★";
  if (c && c.admittedAt) marks[c.admittedAt] = "入";
  if (c && c.dischargedAt) marks[c.dischargedAt] = "退";
  return marks;
}

function chartRowsForCase(c, cats){
  var items = cloneArr(c && c.chart && c.chart.items).filter(Boolean);
  var known = {};
  var groups = cloneArr(cats).map(function(cat){
    known[cat.id] = true;
    return { cat:cat, items:items.filter(function(item){ return item.catId === cat.id; }), orphan:false };
  });
  var orphans = items.filter(function(item){ return !known[item.catId]; });
  if (orphans.length) {
    groups.push({ cat:{ id:"", name:"その他", kind:"", color:"#64748b" }, items:orphans, orphan:true });
  }
  return groups;
}

function computeDay(admittedAt, todayIso){
  var start = Date.parse(String(admittedAt || "") + "T00:00:00");
  var end = Date.parse(String(todayIso || "") + "T00:00:00");
  if (!Number.isFinite(start) || !Number.isFinite(end)) return 1;
  var diff = Math.floor((end - start) / 86400000) + 1;
  return diff < 1 ? 1 : diff;
}

// ---- Unified dated-entry store (SPEC-F) ----------------------------------
// c.entries is the sync source of truth for every list element (next / todo /
// pending / seed / chart items). The legacy collections stay on the case as
// MIRRORS: rebuilt from entries on every normalize, re-absorbed into entries
// (with fresh element timestamps) at each local write boundary. Element
// tombstones live in the same array so one merge covers add/edit/delete.

var ENTRY_TOMBSTONE_TTL_MS = 60 * 24 * 60 * 60 * 1000; // > trash TTL (7d) on purpose

function entryCtx(c, nowIso, todayIso){
  return {
    nowIso: nowIso,
    todayIso: todayIso,
    label: (c && c.label) || "",
    admittedAt: (c && c.admittedAt) || todayIso,
    phaseNote: (c && c.phaseNote) || "",
    lastTouchedAt: (c && typeof c.lastTouchedAt === "string" && c.lastTouchedAt) ? c.lastTouchedAt : nowIso
  };
}

// Content only (no createdAt/updatedAt), fixed key order per kind so that
// JSON.stringify is a stable content signature. Returns null when invalid —
// same validation rules as the mirror normalizers above.
function normalizeEntryContent(raw, ctx){
  var row = isObj(raw) ? raw : {};
  var id = safeId(row.id);
  if (!id) return null;
  var text = typeof row.text === "string" ? row.text : "";
  if (row.kind === "next") {
    var due = row.due === null || row.due === undefined ? null : safeDate(row.due, null);
    if (!text && !due) return null;
    return { kind:"next", id:id, text:text, due:due };
  }
  if (row.kind === "todo") {
    if (!text) return null;
    return { kind:"todo", id:id, text:text, done:row.done === true, createdOn:safeDate(row.createdOn, ctx.todayIso) };
  }
  if (row.kind === "pending") {
    if (!text) return null;
    var backOn = row.backOn === null || row.backOn === undefined ? null : safeDate(row.backOn, null);
    return { kind:"pending", id:id, text:text, backOn:backOn };
  }
  if (row.kind === "seed") {
    if (!text) return null;
    var snap = isObj(row.snapshot) ? row.snapshot : {};
    return {
      kind:"seed", id:id, text:text,
      createdOn: safeDate(row.createdOn, ctx.todayIso),
      snapshot: {
        label: typeof snap.label === "string" ? snap.label : ctx.label,
        day: Number.isFinite(Number(snap.day)) ? Number(snap.day) : computeDay(ctx.admittedAt, ctx.todayIso),
        stageName: typeof snap.stageName === "string" ? snap.stageName : "",
        phaseNote: typeof snap.phaseNote === "string" ? snap.phaseNote : ctx.phaseNote
      },
      sentAt: typeof row.sentAt === "string" ? row.sentAt : null
    };
  }
  if (row.kind === "chartValue" || row.kind === "chartBand" || row.kind === "chartEvent") {
    var catId = safeId(row.catId);
    var name = typeof row.name === "string" ? row.name : "";
    if (!catId || !name) return null;
    if (row.kind === "chartValue") {
      var values = {};
      Object.keys(isObj(row.values) ? row.values : {}).forEach(function(date){
        if (/^\d{4}-\d{2}-\d{2}$/.test(date) && String(row.values[date])) values[date] = String(row.values[date]);
      });
      var planned = {};
      Object.keys(isObj(row.planned) ? row.planned : {}).forEach(function(date){
        if (/^\d{4}-\d{2}-\d{2}$/.test(date) && row.planned[date]) planned[date] = true;
      });
      return { kind:"chartValue", id:id, catId:catId, name:name, values:values, planned:planned };
    }
    if (row.kind === "chartBand") {
      var startDate = safeDate(row.startDate, "");
      if (!startDate) return null;
      return { kind:"chartBand", id:id, catId:catId, name:name, startDate:startDate, endDate:row.endDate == null ? null : safeDate(row.endDate, null) };
    }
    var date = safeDate(row.date, "");
    if (!date) return null;
    return { kind:"chartEvent", id:id, catId:catId, name:name, date:date, status:row.status === "planned" ? "planned" : "done" };
  }
  return null;
}

function entryContentKey(entry){
  var copy = {};
  Object.keys(entry).forEach(function(k){
    if (k !== "createdAt" && k !== "updatedAt") copy[k] = entry[k];
  });
  return JSON.stringify(copy);
}

// Canonical order (createdAt, id). Merge output MUST be identically ordered on
// every device or the JSON dirty-check ping-pongs pushes forever.
function entrySortCanonical(list){
  return cloneArr(list).sort(function(a, b){
    if (a.createdAt !== b.createdAt) return a.createdAt < b.createdAt ? -1 : 1;
    return a.id < b.id ? -1 : a.id > b.id ? 1 : 0;
  });
}

function normalizeEntries(raw, ctx){
  var stamp = ctx.lastTouchedAt || ctx.nowIso;
  var cutoff = Date.parse(ctx.nowIso) - ENTRY_TOMBSTONE_TTL_MS;
  var seen = {};
  var list = cloneArr(raw).map(function(e){
    var row = isObj(e) ? e : {};
    var id = safeId(row.id);
    if (!id || seen[id]) return null;
    seen[id] = true;
    var out;
    if (row.kind === "tombstone") {
      var deletedAt = typeof row.deletedAt === "string" && row.deletedAt ? row.deletedAt : stamp;
      if (Number.isFinite(cutoff) && Date.parse(deletedAt) < cutoff) return null;
      out = { kind:"tombstone", id:id, deletedAt:deletedAt };
    } else {
      out = normalizeEntryContent(row, ctx);
      if (!out) return null;
    }
    out.createdAt = typeof row.createdAt === "string" && row.createdAt ? row.createdAt : stamp;
    out.updatedAt = typeof row.updatedAt === "string" && row.updatedAt ? row.updatedAt : stamp;
    return out;
  }).filter(Boolean);
  return entrySortCanonical(list);
}

// Mirror collections -> entry content list (no timestamps).
function entriesFromMirrors(c, ctx){
  var rows = [];
  cloneArr(c && c.next).forEach(function(x){ rows.push({ kind:"next", id:x.id, text:x.text, due:x.due }); });
  cloneArr(c && c.todos).forEach(function(x){ rows.push({ kind:"todo", id:x.id, text:x.text, done:x.done, createdOn:x.createdOn }); });
  cloneArr(c && c.pendings).forEach(function(x){ rows.push({ kind:"pending", id:x.id, text:x.text, backOn:x.backOn }); });
  cloneArr(c && c.seeds).forEach(function(x){ rows.push({ kind:"seed", id:x.id, text:x.text, createdOn:x.createdOn, snapshot:x.snapshot, sentAt:x.sentAt }); });
  cloneArr(c && c.chart && c.chart.items).forEach(function(x){
    var kind = x.kind === "band" ? "chartBand" : x.kind === "event" ? "chartEvent" : "chartValue";
    var row = { kind:kind, id:x.id, catId:x.catId, name:x.name };
    if (kind === "chartValue") { row.values = x.values; row.planned = x.planned; }
    else if (kind === "chartBand") { row.startDate = x.startDate; row.endDate = x.endDate; }
    else { row.date = x.date; row.status = x.status; }
    rows.push(row);
  });
  return rows.map(function(r){ return normalizeEntryContent(r, ctx); }).filter(Boolean);
}

// Entries -> mirror collections. Entries win: anything not present here
// disappears from the mirrors (deletions), entry-only fields ride along.
function entryRebuildMirrors(c){
  var live = cloneArr(c.entries).filter(function(e){ return e.kind !== "tombstone"; });
  c.next = live.filter(function(e){ return e.kind === "next"; }).map(function(e){ return { id:e.id, text:e.text, due:e.due }; });
  c.todos = live.filter(function(e){ return e.kind === "todo"; }).map(function(e){ return { id:e.id, text:e.text, done:e.done, createdOn:e.createdOn }; });
  c.pendings = live.filter(function(e){ return e.kind === "pending"; }).map(function(e){ return { id:e.id, text:e.text, backOn:e.backOn }; });
  c.seeds = live.filter(function(e){ return e.kind === "seed"; }).map(function(e){
    return { id:e.id, text:e.text, createdOn:e.createdOn, snapshot:JSON.parse(JSON.stringify(e.snapshot)), sentAt:e.sentAt };
  });
  c.chart = { items: live.filter(function(e){ return e.kind === "chartValue" || e.kind === "chartBand" || e.kind === "chartEvent"; }).map(function(e){
    if (e.kind === "chartValue") return { id:e.id, catId:e.catId, kind:"value", name:e.name, values:JSON.parse(JSON.stringify(e.values)), planned:JSON.parse(JSON.stringify(e.planned)) };
    if (e.kind === "chartBand") return { id:e.id, catId:e.catId, kind:"band", name:e.name, startDate:e.startDate, endDate:e.endDate };
    return { id:e.id, catId:e.catId, kind:"event", name:e.name, date:e.date, status:e.status };
  }) };
}

// Additions-only fold-in: mirror elements unknown to entries are adopted with
// deterministic timestamps derived from lastTouchedAt (+index ms keeps the
// original list order under the canonical sort). This is both the one-time
// legacy migration and the mixed-version path for old-device additions;
// old-device edits/deletions intentionally do not propagate (SPEC-F).
function entryFoldMirrors(c, ctx){
  var have = {};
  cloneArr(c.entries).forEach(function(e){ have[e.id] = true; });
  var base = Date.parse(ctx.lastTouchedAt);
  if (!Number.isFinite(base)) base = Date.parse(ctx.nowIso);
  var adds = [];
  entriesFromMirrors(c, ctx).forEach(function(content, idx){
    if (have[content.id]) return;
    have[content.id] = true;
    content.createdAt = new Date(base + idx).toISOString();
    content.updatedAt = content.createdAt;
    adds.push(content);
  });
  if (adds.length) c.entries = entrySortCanonical(cloneArr(c.entries).concat(adds));
}

// Local write boundary: the mutators edit the mirrors; this absorbs the diff
// into entries (adds/edits stamped now, disappearances tombstoned, content
// re-added over a local tombstone = restore wins) and re-derives the mirrors.
function entriesReconcileLocal(c, nowIso, todayIso){
  var ctx = entryCtx(c, nowIso, todayIso);
  var current = {};
  cloneArr(c.entries).forEach(function(e){ current[e.id] = e; });
  var derivedIds = {};
  var changed = false;
  var base = Date.parse(nowIso);
  var offset = 0;
  entriesFromMirrors(c, ctx).forEach(function(content){
    derivedIds[content.id] = true;
    var prev = current[content.id];
    if (prev && prev.kind !== "tombstone" && entryContentKey(prev) === entryContentKey(content)) return;
    content.createdAt = prev && prev.kind !== "tombstone" ? prev.createdAt : new Date(base + (offset++)).toISOString();
    content.updatedAt = nowIso;
    current[content.id] = content;
    changed = true;
  });
  cloneArr(c.entries).forEach(function(e){
    if (e.kind === "tombstone" || derivedIds[e.id]) return;
    current[e.id] = { kind:"tombstone", id:e.id, deletedAt:nowIso, createdAt:e.createdAt, updatedAt:nowIso };
    changed = true;
  });
  if (changed) {
    c.entries = entrySortCanonical(Object.keys(current).map(function(k){ return current[k]; }));
    entryRebuildMirrors(c);
  }
  return changed;
}
// MAR-style overdue = computed, never stored: a planned event whose date has
// passed, or a value-row plan date with no value entered. Stays visible on the
// today column / day view until explicitly resolved (done / move / cancel).
function overdueEntries(c, todayIso){
  var out = [];
  cloneArr(c && c.chart && c.chart.items).forEach(function(item){
    if (!item) return;
    if (item.kind === "event" && item.status === "planned" && item.date && item.date < todayIso) {
      out.push({ id:item.id, kind:"event", catId:item.catId, name:item.name, date:item.date });
    }
    if (item.kind === "value") {
      Object.keys(isObj(item.planned) ? item.planned : {}).forEach(function(d){
        if (d < todayIso && !(isObj(item.values) && item.values[d])) {
          out.push({ id:item.id, kind:"valuePlan", catId:item.catId, name:item.name, date:d });
        }
      });
    }
  });
  return out.sort(function(a, b){
    if (a.date !== b.date) return a.date < b.date ? -1 : 1;
    return a.id < b.id ? -1 : a.id > b.id ? 1 : 0;
  });
}

// Element-level LWW merge. Per-entry updatedAt is the truth; ties prefer the
// tombstone, then a deterministic symmetric content tiebreak. Output is in
// canonical order so both devices serialize identically (no dirty ping-pong).
function mergeEntries(localList, remoteList){
  var byId = {};
  cloneArr(localList).forEach(function(e){ if (isObj(e) && e.id) byId[e.id] = e; });
  cloneArr(remoteList).forEach(function(e){
    if (!isObj(e) || !e.id) return;
    var cur = byId[e.id];
    if (!cur) { byId[e.id] = e; return; }
    var a = cur.updatedAt || "";
    var b = e.updatedAt || "";
    if (b > a) { byId[e.id] = e; return; }
    if (b < a) return;
    var curDead = cur.kind === "tombstone";
    var incDead = e.kind === "tombstone";
    if (curDead !== incDead) { if (incDead) byId[e.id] = e; return; }
    if (JSON.stringify(e) > JSON.stringify(cur)) byId[e.id] = e;
  });
  return entrySortCanonical(Object.keys(byId).map(function(k){ return byId[k]; }));
}
// ---- end unified entry store ---------------------------------------------

function normalizeCase(raw, nowIso, todayIso){
  var src = isObj(raw) ? raw : {};
  var out = {};
  Object.keys(src).forEach(function(k){ out[k] = src[k]; });
  out.id = safeId(src.id);
  out.label = typeof src.label === "string" ? src.label : "";
  out.ageBand = typeof src.ageBand === "string" ? src.ageBand : "";
  out.sex = src.sex === "M" || src.sex === "F" ? src.sex : "";
  out.room = typeof src.room === "string" ? src.room : "";
  out.dxTags = cloneArr(src.dxTags).filter(function(x){ return typeof x === "string" && x; });
  out.status = src.status === "discharged" ? "discharged" : "active";
  out.admittedAt = safeDate(src.admittedAt, todayIso);
  out.dischargedAt = src.dischargedAt === null ? null : safeDate(src.dischargedAt, null);
  out.stageId = typeof src.stageId === "string" && src.stageId ? src.stageId : defaultStages()[0].id;
  out.phaseNote = typeof src.phaseNote === "string" ? src.phaseNote : "";
  // Mirror lists share normalizeEntryContent with the entry store - one
  // validator, one set of coercion rules. The kind tag is stripped afterwards
  // (mirrors are plain rows) and a missing/hostile id falls back per index.
  var mirrorCtx = { nowIso:nowIso, todayIso:todayIso, label:out.label, admittedAt:out.admittedAt, phaseNote:out.phaseNote };
  function mirrorRows(list, kind){
    return cloneArr(list).map(function(item, idx){
      var row = isObj(item) ? Object.assign({}, item) : {};
      row.kind = kind === "todos" ? "todo" : kind === "pendings" ? "pending" : kind;
      if (!safeId(row.id)) row.id = row.kind + "-" + idx;
      var content = normalizeEntryContent(row, mirrorCtx);
      if (content) delete content.kind;
      return content;
    }).filter(Boolean);
  }
  out.next = mirrorRows(src.next, "next");
  out.todos = mirrorRows(src.todos, "todos");
  out.pendings = mirrorRows(src.pendings, "pendings");
  out.stageLog = normalizeStageLog(src.stageLog, out.admittedAt, out.stageId);
  out.stageId = out.stageLog[out.stageLog.length - 1].stageId || out.stageId;
  out.seeds = mirrorRows(src.seeds, "seed");
  out.discharge = {
    checklist:isObj(src.discharge && src.discharge.checklist) ? src.discharge.checklist : {},
    plannedOn:src.discharge && src.discharge.plannedOn ? safeDate(src.discharge.plannedOn, null) : null
  };
  out.order = toNum(src.order, 0);
  out.lastTouchedAt = typeof src.lastTouchedAt === "string" && src.lastTouchedAt ? src.lastTouchedAt : nowIso;
  // The chart was reintroduced with a new schema (SPEC-E): normalizeChart only
  // reads `items`, so old-model payloads (meds/events/rows) collapse to empty.
  out.chart = normalizeChart(src.chart);
  // Removed feature (2026-07-09): purge appts so old local/remote payloads
  // cannot re-introduce them through the unknown-key passthrough above.
  delete out.appts;
  // SPEC-F: entries is the source of truth; the collections above are mirrors.
  // Fold in mirror-only elements (legacy migration / old-device additions),
  // then re-derive the mirrors so entry-side deletions and fields win.
  var ectx = entryCtx(out, nowIso, todayIso);
  out.entries = normalizeEntries(src.entries, ectx);
  entryFoldMirrors(out, ectx);
  entryRebuildMirrors(out);
  return out;
}

function trashCutoffIso(nowIso){
  var now = Date.parse(String(nowIso || ""));
  if (!Number.isFinite(now)) return null;
  return new Date(now - (7 * 24 * 60 * 60 * 1000)).toISOString();
}

function normalizeTrashEntry(entry, nowIso){
  var row = isObj(entry) ? entry : {};
  var types = { "case":true, "next":true, "todo":true, "pending":true, "seed":true, "chartItem":true };
  // Entries of removed types (appt / chartMed / chartEvent) are dropped, not
  // coerced to "case": coercion would turn their payload into a garbage case on restore.
  if (!types[row.type]) return null;
  var deletedAt = typeof row.deletedAt === "string" && row.deletedAt ? row.deletedAt : nowIso;
  var type = row.type;
  var payload = JSON.parse(JSON.stringify(isObj(row.payload) ? row.payload : {}));
  var caseId = typeof row.caseId === "string" ? row.caseId : "";
  var caseLabel = typeof row.caseLabel === "string" ? row.caseLabel : "";
  if (type === "case") {
    payload = normalizeCase(payload, nowIso, todayISOFallback());
    caseId = caseId || payload.id || "";
    caseLabel = caseLabel || payload.label || "";
  } else {
    caseLabel = caseLabel || (payload && typeof payload.label === "string" ? payload.label : "");
  }
  return {
    id: safeId(row.id) || "trash-" + Math.random().toString(36).slice(2, 10),
    deletedAt: deletedAt,
    type: type,
    caseId: caseId,
    caseLabel: caseLabel,
    payload: payload
  };
}

function normalizeState(raw, nowIso, todayIso){
  var src = isObj(raw) ? raw : {};
  var nowStamp = typeof nowIso === "string" && nowIso ? nowIso : new Date().toISOString();
  var todayStamp = typeof todayIso === "string" && todayIso ? todayIso : String(nowStamp).slice(0, 10);
  var cfg = isObj(src.config) ? src.config : {};
  var stages = cloneArr(cfg.stages).map(normalizeStage).filter(function(x){ return x.id && x.name; });
  if (!stages.length) stages = defaultStages();
  var chartCats = cloneArr(cfg.chartCats).map(normalizeChartCat).filter(function(x){ return x.id && x.name; });
  if (!chartCats.length) chartCats = defaultChartCats();
  var cutoff = trashCutoffIso(nowStamp);
  var state = {
    v: 1,
    // A case whose id fails safeId (hostile/corrupt import) is dropped: an
    // empty id can be neither addressed by mutateCase nor synced coherently.
    cases: cloneArr(src.cases).map(function(c, idx){
      var item = normalizeCase(c, nowStamp, todayStamp);
      if (!Number.isFinite(item.order)) item.order = idx;
      return item;
    }).filter(function(c){ return !!c.id; }),
    config: {
      stages: stages,
      labels: normalizeLabels(cfg.labels),
      chartCats: chartCats
    },
    trash: cloneArr(src.trash).map(function(entry){
      return normalizeTrashEntry(entry, nowStamp);
    }).filter(Boolean).filter(function(entry){
      if (!cutoff) return true;
      return String(entry.deletedAt || "") >= cutoff;
    })
  };
  state.cases = state.cases.map(function(c, idx){
    if (!Number.isFinite(c.order)) c.order = idx;
    if (!hasStageId(state.config.stages, c.stageId)) c.stageId = state.config.stages[0].id;
    return c;
  });
  return state;
}

function hasStageId(stages, stageId){
  return cloneArr(stages).some(function(s){ return s.id === stageId; });
}

function rolloverTodos(c, todayIso){
  return cloneArr(c && c.todos).filter(function(item){
    if (!item || item.done !== true) return true;
    return !(item.createdOn && item.createdOn < todayIso);
  }).map(function(item){
    return {
      id:item.id,
      text:item.text,
      done:item.done === true,
      createdOn:item.createdOn
    };
  });
}

function hasBackToday(c, todayIso){
  return cloneArr(c && c.pendings).some(function(item){
    return !!(item && item.backOn && item.backOn <= todayIso);
  });
}

function boardOrder(cases, todayIso){
  var active = cloneArr(cases).filter(function(c){ return c && c.status === "active"; });
  var urgent = [];
  var rest = [];
  active.sort(function(a, b){ return toNum(a.order, 0) - toNum(b.order, 0); });
  active.forEach(function(c){
    if (hasBackToday(c, todayIso)) urgent.push(c);
    else rest.push(c);
  });
  return urgent.concat(rest);
}

function stalenessLevel(lastTouchedAt, nowIso){
  var touched = Date.parse(String(lastTouchedAt || ""));
  var now = Date.parse(String(nowIso || ""));
  if (!Number.isFinite(touched) || !Number.isFinite(now)) return 0;
  var hours = (now - touched) / 3600000;
  if (hours >= 48) return 2;
  if (hours >= 24) return 1;
  return 0;
}

function needsReview(c, todayIso){
  var dayStart = Date.parse(String(todayIso || "") + "T00:00:00");
  var touched = Date.parse(String(c && c.lastTouchedAt || ""));
  if (!Number.isFinite(dayStart) || !Number.isFinite(touched)) return true;
  return touched < dayStart;
}

function reviewQueue(cases, todayIso){
  return boardOrder(cases, todayIso).filter(function(c){
    return needsReview(c, todayIso);
  });
}

function unsentSeeds(cases){
  var active = cloneArr(cases).filter(function(c){ return c && c.status === "active"; })
    .sort(function(a, b){ return toNum(a.order, 0) - toNum(b.order, 0); });
  var discharged = cloneArr(cases).filter(function(c){ return c && c.status === "discharged"; })
    .sort(function(a, b){ return toNum(a.order, 0) - toNum(b.order, 0); });
  return active.concat(discharged).reduce(function(out, c){
    cloneArr(c.seeds).forEach(function(seed){
      if (seed && seed.sentAt == null) out.push(seed);
    });
    return out;
  }, []);
}

function countSeedsOn(cases, todayIso){
  return cloneArr(cases).reduce(function(total, c){
    return total + cloneArr(c && c.seeds).filter(function(seed){
      return seed && seed.createdOn === todayIso;
    }).length;
  }, 0);
}

function formatSeedExport(seeds, todayIso){
  var header = "## " + todayIso + " の種（Wardbook 手動書き出し）";
  if (!cloneArr(seeds).length) return header;
  return header + "\n" + cloneArr(seeds).map(function(seed){
    var snap = isObj(seed && seed.snapshot) ? seed.snapshot : {};
    var parts = [
      (typeof snap.label === "string" ? snap.label : "") + " D" + (Number.isFinite(Number(snap.day)) ? Number(snap.day) : 1),
      typeof snap.stageName === "string" ? snap.stageName : "",
      typeof snap.phaseNote === "string" ? snap.phaseNote : ""
    ].filter(function(x){ return !!x; });
    return "- [ ] " + String(seed && seed.text || "") + "\n  - 局面: " + parts.join("｜");
  }).join("\n");
}

function missSeedText(oldText, whyText){
  var why = String(whyText || "").trim();
  return "予測外れ: " + String(oldText || "") + (why ? " → " + why : "");
}

function makeSeed(id, text, createdOn, snapshotFields){
  var snap = isObj(snapshotFields) ? snapshotFields : {};
  return {
    id:id,
    text:text,
    createdOn:createdOn,
    snapshot:{
      label:typeof snap.label === "string" ? snap.label : "",
      day:Number.isFinite(Number(snap.day)) ? Number(snap.day) : 1,
      stageName:typeof snap.stageName === "string" ? snap.stageName : "",
      phaseNote:typeof snap.phaseNote === "string" ? snap.phaseNote : ""
    },
    sentAt:null
  };
}

function normalizeStageLog(raw, admittedAt, stageId){

    var row = isObj(item) ? item : {};
    return {

      stageId:typeof row.stageId === "string" && row.stageId ? row.stageId : stageId
    };
  }).filter(function(item){ return item.stageId; });
  if (!rows.length) rows = [{ date:admittedAt, stageId:stageId }];
  rows.sort(function(a, b){ return a.date.localeCompare(b.date); });
  return rows.reduce(function(out, item){
    if (out.length && out[out.length - 1].date === item.date) out[out.length - 1] = item;
    else out.push(item);
    return out;
  }, []);
}

function stageOn(stageLog, date){
  var rows = cloneArr(stageLog).sort(function(a, b){ return String(a.date || "").localeCompare(String(b.date || "")); });
  if (!rows.length) return "";
  var active = rows[0].stageId || "";
  rows.forEach(function(item){
    if (item && item.date <= date && item.stageId) active = item.stageId;
  });
  return active;
}

function buildWeekGrid(cases, todayIso, pastDays, futureDays){
  var base = Date.parse(todayIso + "T00:00:00");
  var past = Number.isFinite(Number(pastDays)) ? Math.max(0, Number(pastDays)) : 7;
  var future = Number.isFinite(Number(futureDays)) ? Math.max(0, Number(futureDays)) : 7;
  var dates = [];
  for (var i = -past; i <= future; i += 1) {
    var d = new Date(base + i * 86400000);
    dates.push(d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"));
  }
  var rows = boardOrder(cases, todayIso).filter(function(c){ return c.status !== "discharged"; }).map(function(c){
    var cells = {};
    var firstStageId = c && c.stageLog && c.stageLog[0] && c.stageLog[0].stageId ? c.stageLog[0].stageId : "";
    var chartItems = cloneArr(c.chart && c.chart.items);
    var overdue = overdueEntries(c, todayIso);
    dates.forEach(function(date){
      var markers = [];
      cloneArr(c.next).forEach(function(item){ if (item && item.due === date && date > todayIso) markers.push({ kind:"next", text:"\u6b21" }); });
      cloneArr(c.pendings).forEach(function(item){ if (item && item.backOn === date && date > todayIso) markers.push({ kind:"pending", text:"\u5f85" }); });
      if (c.discharge && c.discharge.plannedOn === date && date > todayIso) markers.push({ kind:"planned", text:"\u2605" });
      cloneArr(c.todos).forEach(function(item){
        if (!item || item.done) return;
        // Undone todos live on today (auto-rollover); future-scheduled ones on their day.
        if ((date === todayIso && item.createdOn <= todayIso) || (date > todayIso && item.createdOn === date)) {
          markers.push({ kind:"todo", text:"\u4eca" });
        }
      });
      var events = [];
      var bands = [];
      var plans = [];
      chartItems.forEach(function(item){
        if (!item) return;
        if (item.kind === "event" && item.date === date) events.push({ id:item.id, catId:item.catId, name:item.name, status:item.status });
        if (item.kind === "band" && bandOnDate(item, date)) bands.push({ id:item.id, catId:item.catId, name:item.name });
        if (item.kind === "value" && isObj(item.planned) && item.planned[date]) {
          plans.push({ id:item.id, catId:item.catId, name:item.name, entered:!!(isObj(item.values) && item.values[date]) });
        }
      });
      var stageId = "";
      if (date >= c.admittedAt && date <= todayIso) stageId = stageOn(c.stageLog, date) || firstStageId;
      cells[date] = {
        stageId:stageId,
        markers:markers,
        events:events,
        bands:bands,
        plans:plans,
        overdue:date === todayIso ? overdue : []
      };
    });
    return { case:c, dates:cells };
  });
  return { dates:dates, rows:rows, today:todayIso };
}

function buildDayPlan(cases, date, todayIso){
  var groups = [];
  boardOrder(cases, todayIso).filter(function(c){ return c.status !== "discharged"; }).forEach(function(c){
    var items = [];
    if (date === todayIso) {
      // Unresolved past plans surface on today until explicitly resolved (MAR).
      overdueEntries(c, todayIso).forEach(function(o){
        items.push({ type:"overdue", id:o.id, text:o.name, kind:o.kind, date:o.date, catId:o.catId });
      });
    }
    if (date === todayIso) {
      cloneArr(c.todos).forEach(function(item){
        if (item && !item.done && item.createdOn <= todayIso) items.push({ type:"todo", id:String(item.id || ""), text:String(item.text || "") });
      });
    } else if (date > todayIso) {
      cloneArr(c.todos).forEach(function(item){
        if (item && !item.done && item.createdOn === date) items.push({ type:"todo", id:String(item.id || ""), text:String(item.text || "") });
      });
    }
    cloneArr(c.next).forEach(function(item){
      if (item && item.due === date) items.push({ type:"next", id:String(item.id || ""), text:String(item.text || "") });
    });
    cloneArr(c.pendings).forEach(function(item){
      if (item && item.backOn === date) items.push({ type:"pending", id:String(item.id || ""), text:String(item.text || "") });
    });
    cloneArr(c.chart && c.chart.items).forEach(function(item){
      if (!item) return;
      if (item.kind === "event" && item.date === date) {
        items.push({ type:"event", id:item.id, text:item.name, catId:item.catId, status:item.status });
      }
      if (item.kind === "value" && isObj(item.planned) && item.planned[date]) {
        items.push({ type:"valuePlan", id:item.id, text:item.name, catId:item.catId, entered:!!(isObj(item.values) && item.values[date]) });
      }
    });
    if (c.discharge && c.discharge.plannedOn === date) items.push({ type:"discharge", id:"", text:"" });
    if (items.length) groups.push({ caseId:c.id, label:c.label, admittedAt:c.admittedAt, stageId:c.stageId, items:items });
  });
  return groups;
}

function searchCases(cases, query, filters){
  var q = String(query || "").trim().toLowerCase();
  var month = filters && filters.month ? filters.month : "";
  var stageId = filters && filters.stageId ? filters.stageId : "";
  return cloneArr(cases).filter(function(c){
    if (month && String(c.admittedAt || "").slice(0, 7) !== month) return false;
    if (stageId && c.stageId !== stageId) return false;
    if (!q) return true;
    var fields = [c.label, c.room, (c.dxTags || []).join(" "), c.phaseNote]
      .concat(cloneArr(c.next).map(function(x){ return x.text; }))
      .concat(cloneArr(c.todos).map(function(x){ return x.text; }))
      .concat(cloneArr(c.pendings).map(function(x){ return x.text; }))
      .concat(cloneArr(c.seeds).map(function(x){ return x.text; }));
    return fields.some(function(text){ return String(text || "").toLowerCase().indexOf(q) >= 0; });
  }).map(function(c){
    var fields = [c.label, c.room, (c.dxTags || []).join(" "), c.phaseNote]
      .concat(cloneArr(c.next).map(function(x){ return x.text; }))
      .concat(cloneArr(c.todos).map(function(x){ return x.text; }))
      .concat(cloneArr(c.pendings).map(function(x){ return x.text; }))
      .concat(cloneArr(c.seeds).map(function(x){ return x.text; }));
    var hint = q ? (fields.find(function(text){ return String(text || "").toLowerCase().indexOf(q) >= 0; }) || "") : "";
    return { case:c, hint:hint };
  });
}

function reviewStreak(reviewDates, todayIso){
  var days = isObj(reviewDates) ? reviewDates : {};
  var start = todayIso;
  if (!days[start]) {
    var prev = new Date(Date.parse(todayIso + "T00:00:00") - 86400000);
    start = prev.getFullYear() + "-" + String(prev.getMonth() + 1).padStart(2, "0") + "-" + String(prev.getDate()).padStart(2, "0");
    if (!days[start]) return 0;
  }
  var count = 0;
  var cur = Date.parse(start + "T00:00:00");
  while (Number.isFinite(cur)) {
    var d = new Date(cur);
    var iso = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    if (!days[iso]) break;
    count += 1;
    cur -= 86400000;
  }
  return count;
}

function moveIdInList(ids, id, direction){
  var from = ids.indexOf(id);
  var to = direction === "up" ? from - 1 : from + 1;
  if (from < 0 || to < 0 || to >= ids.length) return cloneArr(ids);
  var next = cloneArr(ids);
  next.splice(to, 0, next.splice(from, 1)[0]);
  return next;
}

function syncDiffFields(prevCase, currCase){
  var keys = {};
  Object.keys(prevCase || {}).forEach(function(k){ keys[k] = true; });
  Object.keys(currCase || {}).forEach(function(k){ keys[k] = true; });
  var changed = [];
  Object.keys(keys).forEach(function(k){
    if(k === "id"){ return; }
    var a = prevCase ? JSON.stringify(prevCase[k] === undefined ? null : prevCase[k]) : "__none__";
    var b = currCase ? JSON.stringify(currCase[k] === undefined ? null : currCase[k]) : "__none__";
    if(a !== b){ changed.push(k); }
  });
  return changed;
}

function syncMergeCase(localCase, localMt, remoteCase, remoteMt){
  localMt = localMt || {};
  remoteMt = remoteMt || {};
  var merged = JSON.parse(JSON.stringify(localCase));
  var mt = {};
  var keys = {};
  Object.keys(localCase || {}).forEach(function(k){ keys[k] = true; });
  Object.keys(remoteCase || {}).forEach(function(k){ keys[k] = true; });
  var tookRemote = false;
  Object.keys(keys).forEach(function(k){
    if(k === "id"){ return; }
    if(k === "entries"){
      // SPEC-F: entries merge element-wise on per-entry updatedAt, never by the
      // field clock (both devices may edit different elements of this one field).
      merged.entries = mergeEntries(localCase && localCase.entries, remoteCase && remoteCase.entries);
      var elt = localMt[k] || "";
      var ert = remoteMt[k] || "";
      var emax = ert > elt ? ert : elt;
      if(emax){ mt[k] = emax; }
      if(JSON.stringify(localCase && localCase.entries) !== JSON.stringify(merged.entries)){ tookRemote = true; }
      return;
    }
    var lt = localMt[k] || "";
    var rt = remoteMt[k] || "";
    if(rt > lt && (k in (remoteCase || {}))){
      merged[k] = JSON.parse(JSON.stringify(remoteCase[k]));
      mt[k] = rt;
      if(JSON.stringify(localCase && localCase[k]) !== JSON.stringify(remoteCase[k])){ tookRemote = true; }
    }else if(lt){
      mt[k] = lt;
    }
  });
  if(merged.entries !== undefined){
    // Keep the merged case self-consistent BEFORE it is snapshotted: adopt
    // mirror-only additions (old-device pushes), then re-derive the mirrors
    // from entries. Without this every cross-device merge would echo one
    // extra push when normalizeState later rewrites the mirrors.
    var ctx = entryCtx(merged, merged.lastTouchedAt || "", String(merged.lastTouchedAt || "").slice(0, 10));
    entryFoldMirrors(merged, ctx);
    entryRebuildMirrors(merged);
  }
  return { merged:merged, mt:mt, tookRemote:tookRemote };
}

function syncEmptyState(){
  return { snap:{}, mt:{}, dirty:{}, tombstones:{}, restored:{}, configSnap:null, configMt:{}, configDirty:false };
}

function syncMarkRestored(state, id){
  state = state || syncEmptyState();
  if (!id) return state;
  delete state.tombstones[id];
  delete state.snap[id];
  delete state.mt[id];
  // The restored flag is what lets this case survive a remote tombstone in
  // syncReconcile; a case that merely exists locally without the flag must
  // still be deleted when a remote tombstone arrives (normal delete propagation).
  state.restored = state.restored || {};
  state.restored[id] = true;
  state.dirty[id] = true;
  return state;
}

function syncNoteLocalChanges(data, state, nowIso){
  state = state || syncEmptyState();
  var seen = {};
  (data.cases || []).forEach(function(c){
    seen[c.id] = true;
    if(state.tombstones[c.id]){ return; }
    var prevJson = state.snap[c.id];
    var prev = prevJson ? JSON.parse(prevJson) : null;
    var changed = syncDiffFields(prev, c);
    if(changed.length){
      // First snapshot of a case (sync enable / re-enable) is a baseline, not an
      // edit: stamp with the case's own lastTouchedAt so older local data cannot
      // beat newer remote data in the LWW merge. Real edits keep nowIso.
      var stamp = prev ? nowIso : ((typeof c.lastTouchedAt === "string" && c.lastTouchedAt) ? c.lastTouchedAt : nowIso);
      state.mt[c.id] = state.mt[c.id] || {};
      changed.forEach(function(k){ state.mt[c.id][k] = stamp; });
      state.snap[c.id] = JSON.stringify(c);
      state.dirty[c.id] = true;
    }
  });
  Object.keys(state.snap).forEach(function(id){
    if(!seen[id]){
      delete state.snap[id];
      delete state.mt[id];
      if(state.restored) delete state.restored[id];
      // Design session 2026-07-09 decision 3: tombstones carry their deletion
      // time so "delete vs later edit" resolves by newest-wins like everything else.
      state.tombstones[id] = nowIso;
      state.dirty[id] = true;
    }
  });
  var currentConfig = { stages:(data.config && data.config.stages) || [], labels:(data.config && data.config.labels) || {}, chartCats:(data.config && data.config.chartCats) || [] };
  var prevConfig = state.configSnap ? JSON.parse(state.configSnap) : null;
  var mergedCfgMt = state.configMt || {};
  // First config snapshot is a baseline, not an edit: leave mt/dirty untouched so
  // a fresh device's default config never overwrites the server's config.
  // Seeding an empty server is handled in syncReconcileConfig.
  if(prevConfig){
    ["stages", "labels", "chartCats"].forEach(function(k){
      var a = JSON.stringify(prevConfig[k] === undefined ? null : prevConfig[k]);
      var b = JSON.stringify(currentConfig[k] === undefined ? null : currentConfig[k]);
      if(a !== b){
        mergedCfgMt[k] = nowIso;
        state.configDirty = true;
      }
    });
  }
  state.configMt = mergedCfgMt;
  state.configSnap = JSON.stringify(currentConfig);
  return state;
}

function syncReconcile(data, state, remoteList, nowIso){
  state = syncNoteLocalChanges(data, state, nowIso);
  var byId = {};
  (data.cases || []).forEach(function(c){ byId[c.id] = c; });
  var localChanged = false;
  (remoteList || []).forEach(function(r){
    if(r.deleted){
      if(byId[r.id] && state.restored && state.restored[r.id]){
        state.dirty[r.id] = true;
        return;
      }
      // Remote deletion vs local edits: when the tombstone carries a time and
      // any local field edit is NEWER, the case survives and is pushed back
      // (revival). Missing deletedAt = legacy doc = old delete-wins behavior.
      if(byId[r.id] && typeof r.deletedAt === "string" && r.deletedAt){
        var localNewest = "";
        var mtMap = state.mt[r.id] || {};
        Object.keys(mtMap).forEach(function(k){ if(mtMap[k] > localNewest) localNewest = mtMap[k]; });
        if(!localNewest && byId[r.id].lastTouchedAt) localNewest = byId[r.id].lastTouchedAt;
        if(localNewest > r.deletedAt){
          state.dirty[r.id] = true;
          return;
        }
      }
      state.tombstones[r.id] = typeof r.deletedAt === "string" && r.deletedAt ? r.deletedAt : nowIso;
      delete state.dirty[r.id];
      delete state.snap[r.id];
      delete state.mt[r.id];
      if(state.restored) delete state.restored[r.id];
      if(byId[r.id]){
        data.cases = data.cases.filter(function(c){ return c.id !== r.id; });
        delete byId[r.id];
        localChanged = true;
      }
      return;
    }
    if(state.tombstones[r.id]){
      if(state.dirty[r.id]){
        // Local deletion pending push vs a live remote: a remote edit NEWER
        // than our deletion time wins and resurrects the case.
        var delAt = typeof state.tombstones[r.id] === "string" ? state.tombstones[r.id] : "";
        var remoteNewest = "";
        Object.keys(r.mt || {}).forEach(function(k){ if(r.mt[k] > remoteNewest) remoteNewest = r.mt[k]; });
        if(!(delAt && remoteNewest > delAt)){ return; }
        delete state.dirty[r.id];
      }
      delete state.tombstones[r.id];
    }
    var local = byId[r.id];
    if(!local){
      var incoming = normalizeCase(r.case, nowIso, String(nowIso).slice(0, 10));
      incoming.id = r.id;
      data.cases.push(incoming);
      state.snap[r.id] = JSON.stringify(incoming);
      state.mt[r.id] = JSON.parse(JSON.stringify(r.mt || {}));
      delete state.dirty[r.id];
      if(state.restored) delete state.restored[r.id];
      // A non-canonical server doc (older app version) is pushed back once in
      // canonical form so both devices converge on the same serialization.
      if(syncDiffFields(r.case, incoming).length > 0){ state.dirty[r.id] = true; }
      localChanged = true;
      return;
    }
    var res = syncMergeCase(local, state.mt[r.id], r.case, r.mt);
    // Snapshot the NORMALIZED merge result: DB goes through normalizeState right
    // after reconcile, so a raw snapshot would re-detect the normalize delta as
    // a fresh local edit on every sync (phantom now-stamped pushes, and expired
    // entry tombstones re-imported from remote could never finish purging).
    var merged = normalizeCase(res.merged, nowIso, String(nowIso).slice(0, 10));
    merged.id = r.id;
    var mergedJson = JSON.stringify(merged);
    if(mergedJson !== JSON.stringify(local)){
      var idx = data.cases.indexOf(local);
      data.cases[idx] = merged;
      byId[r.id] = merged;
      localChanged = true;
    }
    state.mt[r.id] = res.mt;
    if(syncDiffFields(r.case, merged).length > 0){ state.dirty[r.id] = true; }
    else {
      delete state.dirty[r.id];
      // Reconciled against a live remote copy: the restore flag has served its
      // purpose. Left in place it would override legitimate FUTURE deletions.
      if(state.restored) delete state.restored[r.id];
    }
    state.snap[r.id] = mergedJson;
  });
  var pushes = [];
  Object.keys(state.dirty).forEach(function(id){
    if(state.tombstones[id]){
      pushes.push({ id:id, deleted:true, case:null, mt:null, deletedAt:typeof state.tombstones[id] === "string" ? state.tombstones[id] : null });
    }else if(byId[id]){
      pushes.push({ id:id, deleted:false, case:byId[id], mt:state.mt[id] || {} });
    }
  });
  return { data:data, state:state, pushes:pushes, localChanged:localChanged };
}

function syncClearDirty(state, ids){
  (ids || []).forEach(function(id){
    delete state.dirty[id];
    if(state.restored) delete state.restored[id];
  });
  return state;
}

var subtle = (typeof globalThis !== "undefined" && globalThis.crypto) ? globalThis.crypto.subtle : null;

function b64FromBytes(bytes){
  var bin = "";
  var arr = new Uint8Array(bytes);
  for(var i = 0; i < arr.length; i += 1){ bin += String.fromCharCode(arr[i]); }
  return globalThis.btoa(bin);
}

function bytesFromB64(b64){
  var bin = globalThis.atob(b64);
  var arr = new Uint8Array(bin.length);
  for(var i = 0; i < bin.length; i += 1){ arr[i] = bin.charCodeAt(i); }
  return arr;
}

var PBKDF2_ITER = 310000;

function syncRandomSaltB64(){
  var bytes = new Uint8Array(16);
  globalThis.crypto.getRandomValues(bytes);
  return b64FromBytes(bytes);
}

async function syncDeriveKey(passphrase, saltB64, iter){
  var enc = new TextEncoder();
  var baseKey = await subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  return subtle.deriveKey(
    { name:"PBKDF2", salt:bytesFromB64(saltB64), iterations:iter || PBKDF2_ITER, hash:"SHA-256" },
    baseKey,
    { name:"AES-GCM", length:256 },
    true,
    ["encrypt", "decrypt"]
  );
}

async function syncEncryptJson(key, obj){
  var iv = new Uint8Array(12);
  globalThis.crypto.getRandomValues(iv);
  var enc = new TextEncoder();
  var cipher = await subtle.encrypt({ name:"AES-GCM", iv:iv }, key, enc.encode(JSON.stringify(obj)));
  return { iv:b64FromBytes(iv), blob:b64FromBytes(cipher) };
}

async function syncDecryptJson(key, blobB64, ivB64){
  var plain = await subtle.decrypt({ name:"AES-GCM", iv:bytesFromB64(ivB64) }, key, bytesFromB64(blobB64));
  return JSON.parse(new TextDecoder().decode(plain));
}

function syncConfigPlain(data){
  return {
    config:{
      stages:cloneArr(data && data.config && data.config.stages).map(function(x){ return JSON.parse(JSON.stringify(x)); }),
      labels:JSON.parse(JSON.stringify((data && data.config && data.config.labels) || {})),
      chartCats:cloneArr(data && data.config && data.config.chartCats).map(function(x){ return JSON.parse(JSON.stringify(x)); })
    },
    mt:JSON.parse(JSON.stringify((data && data._configMt) || {}))
  };
}

function syncReconcileConfig(data, state, remoteDoc, nowIso){
  state = state || syncEmptyState();
  if(!remoteDoc || !remoteDoc.config){
    // Server has no config yet: seed it from this device. Stamping happens here
    // (not at baseline time) because only an empty server may take unstamped local config.
    if(nowIso){
      var cfgMt = state.configMt || {};
      var seeded = false;
      ["stages", "labels", "chartCats"].forEach(function(k){
        if(!cfgMt[k]){ cfgMt[k] = nowIso; seeded = true; }
      });
      state.configMt = cfgMt;
      if(seeded){ state.configDirty = true; }
      data._configMt = JSON.parse(JSON.stringify(cfgMt));
    }
    return { data:data, state:state, localChanged:false, push:!!state.configDirty };
  }
  var localCfg = { stages:data.config.stages, labels:data.config.labels, chartCats:data.config.chartCats };
  var res = syncMergeCase(localCfg, state.configMt || {}, remoteDoc.config, remoteDoc.mt || {});
  var changed = JSON.stringify(res.merged) !== JSON.stringify(localCfg);
  if(changed){
    data.config.stages = cloneArr(res.merged.stages);
    data.config.labels = JSON.parse(JSON.stringify(res.merged.labels || {}));
    data.config.chartCats = cloneArr(res.merged.chartCats);
  }
  state.configMt = res.mt;
  state.configSnap = JSON.stringify({ stages:data.config.stages, labels:data.config.labels, chartCats:data.config.chartCats });
  state.configDirty = syncDiffFields(remoteDoc.config, res.merged).length > 0;
  data._configMt = JSON.parse(JSON.stringify(res.mt));
  return { data:data, state:state, localChanged:changed, push:!!state.configDirty };
}

}

  var y = Number(String(date).slice(0, 4));
  var m = Number(String(date).slice(5, 7));
  var d = Number(String(date).slice(8, 10));
  return new Date(y, m - 1, d).getDay();

  if (entry.type === "case") return entry.caseLabel || payload.label || "";

  return payload.text || "";

function restoreTrash(trashId){
  var entry = cloneArr(DB.trash).find(function(row){ return row.id === trashId; });
  if (!entry) return;
  var stamp = nowISO();
  if (entry.type === "case") {
    // Keep the payload's own lastTouchedAt: the baseline stamp after the sync
    // reset must reflect how old this snapshot really is, or restoring stale
    // trash would overwrite the other device's newer edits field by field.
    var restored = normalizeCase(entry.payload, stamp, todayISO());
    DB.cases = cloneArr(DB.cases).filter(function(c){ return c.id !== restored.id; });
    DB.cases.push(restored);
    if (SYNC && SYNC.state) {
      syncMarkRestored(SYNC.state, restored.id);
      saveSync();
    }
    removeTrashEntry(entry.id);
    saveState();
    render();
    syncAfterSave();
    return;
  }
  var restoredSub = false;
  mutateCase(entry.caseId, function(c){
    if (entry.type === "next") c.next.push(JSON.parse(JSON.stringify(entry.payload)));
    else if (entry.type === "todo") c.todos.push(JSON.parse(JSON.stringify(entry.payload)));
    else if (entry.type === "pending") c.pendings.push(JSON.parse(JSON.stringify(entry.payload)));
    else if (entry.type === "seed") c.seeds.push(JSON.parse(JSON.stringify(entry.payload)));
    else if (entry.type === "chartItem") {
      c.chart = normalizeChart(c.chart);
      c.chart.items.push(JSON.parse(JSON.stringify(entry.payload)));
    }
    removeTrashEntry(entry.id);
    restoredSub = true;
  });
  if (!restoredSub && typeof alert === "function") alert(STR.restoreMissingCase);
}

function resolveTheme(){
  if (THEME_MODE === "light" || THEME_MODE === "dark") return THEME_MODE;
  try {
    if (typeof matchMedia === "function" && matchMedia("(prefers-color-scheme: dark)").matches) return "dark";
  } catch (e) {}
  return "light";
}

function applyTheme(){
  var theme = resolveTheme();
  if (typeof document !== "undefined" && document.documentElement && document.documentElement.setAttribute) {
    document.documentElement.setAttribute("data-theme", theme);
  }
  var meta = typeof document !== "undefined" && document.querySelector ? document.querySelector('meta[name="theme-color"]') : null;
  if (meta && meta.setAttribute) meta.setAttribute("content", theme === "dark" ? "#13161a" : "#f5f6f8");
}

    case "offline": return "オフライン（ローカル保存は正常）" + (at ? " ・前回 " + at : "");

    case "error": return "同期エラー" + (at ? " ・前回 " + at : "");
    default: return at ? "前回 " + at : "待機中";
  }
}

function setSyncStatus(kind){
  SYNC_STATUS = { kind:kind };
  if (typeof document !== "undefined" && document.querySelectorAll) {
    document.querySelectorAll("[data-sync-status]").forEach(function(el){ el.textContent = syncStatusLabel(); });
  }
}

function patchOutboxStatus(text){
  REVIEW.outboxStatus = text || "";
  if (typeof document !== "undefined" && document.querySelectorAll) {
    document.querySelectorAll("[data-outbox-status]").forEach(function(el){ el.textContent = REVIEW.outboxStatus; });
  }
}

async function syncSdk(){
  if (SYNC_RT.fb) return SYNC_RT.fb;
  var base = "https://www.gstatic.com/firebasejs/10.14.1/";
  var mods = await Promise.all([
    import(base + "firebase-app.js"),
    import(base + "firebase-auth.js"),
    import(base + "firebase-firestore.js")
  ]);
  SYNC_RT.fb = { app:mods[0], auth:mods[1], fs:mods[2] };
  return SYNC_RT.fb;
}

async function syncApp(config){
  var fb = await syncSdk();
  var cfg = config || (SYNC && SYNC.config);
  var cfgJson = JSON.stringify(cfg || {});
  if (!SYNC_RT.appInst || SYNC_RT.appCfg !== cfgJson) {
    SYNC_RT.appCount += 1;
    SYNC_RT.appInst = fb.app.initializeApp(cfg, "wardbook-" + SYNC_RT.appCount);
    SYNC_RT.appCfg = cfgJson;
  }
  return fb;
}

async function syncCurrentUser(fb){
  var authInst = fb.auth.getAuth(SYNC_RT.appInst);
  if (authInst.currentUser) return authInst.currentUser;
  await new Promise(function(resolve){
    var un = fb.auth.onAuthStateChanged(authInst, function(){
      un();
      resolve();
    });
  });
  return authInst.currentUser;
}

async function syncAesKey(){
  if (SYNC_RT.key) return SYNC_RT.key;
  SYNC_RT.key = await crypto.subtle.importKey("jwk", SYNC.keyJwk, { name:"AES-GCM" }, true, ["encrypt", "decrypt"]);
  return SYNC_RT.key;
}

function syncRefs(fb, uid){
  var db = fb.fs.getFirestore(SYNC_RT.appInst);
  return {
    casesCol: fb.fs.collection(db, "users", uid, "wb_cases"),
    caseDoc: function(id){ return fb.fs.doc(db, "users", uid, "wb_cases", id); },
    cryptoDoc: fb.fs.doc(db, "users", uid, "wb_meta", "crypto"),
    configDoc: fb.fs.doc(db, "users", uid, "wb_meta", "config"),
    outboxDoc: function(id){ return fb.fs.doc(db, "users", uid, "wb_outbox", id); }
  };
}

async function syncPullCases(fb, uid){
  var refs = syncRefs(fb, uid);
  var snap = await fb.fs.getDocs(refs.casesCol);
  var key = await syncAesKey();
  var out = [];
  for (var i = 0; i < snap.docs.length; i += 1) {
    var d = snap.docs[i];
    var v = d.data();
    if (v.deleted) { out.push({ id:d.id, deleted:true, case:null, mt:null, deletedAt:typeof v.deletedAt === "string" ? v.deletedAt : null }); continue; }
    try {
      var payload = await syncDecryptJson(key, v.blob, v.iv);
      out.push({ id:d.id, deleted:false, case:payload.case, mt:payload.mt || {} });
    } catch (e) {
      // One corrupt/undecryptable doc must not brick sync for everything else.
      // Skipped docs stay untouched on the server; a local dirty copy repairs
      // them on the next push.
      if (typeof console !== "undefined" && console.warn) console.warn("wardbook sync: skip doc " + d.id, e);
    }
  }
  return out;
}

async function syncPullConfig(fb, uid){
  var refs = syncRefs(fb, uid);
  var snap = await fb.fs.getDoc(refs.configDoc);
  if (!snap.exists()) return null;
  var v = snap.data();
  var key = await syncAesKey();
  return await syncDecryptJson(key, v.blob, v.iv);
}

async function syncPushCases(fb, uid, pushes){
  var refs = syncRefs(fb, uid);
  var key = await syncAesKey();
  for (var i = 0; i < pushes.length; i += 1) {
    var p = pushes[i];
    if (p.deleted) {
      // deletedAt is a plain timestamp (no clinical content) - same class of
      // metadata as updatedAt, needed for delete-vs-edit resolution.
      await fb.fs.setDoc(refs.caseDoc(p.id), { v:1, deleted:true, deletedAt:p.deletedAt || null, updatedAt:fb.fs.serverTimestamp() });
    } else {
      var enc = await syncEncryptJson(key, { case:p.case, mt:p.mt });
      await fb.fs.setDoc(refs.caseDoc(p.id), { v:1, deleted:false, iv:enc.iv, blob:enc.blob, updatedAt:fb.fs.serverTimestamp() });
    }
  }
}

async function syncPushConfig(fb, uid){
  var refs = syncRefs(fb, uid);
  var key = await syncAesKey();
  var plain = syncConfigPlain(DB);
  var enc = await syncEncryptJson(key, plain);
  await fb.fs.setDoc(refs.configDoc, { v:1, iv:enc.iv, blob:enc.blob, updatedAt:fb.fs.serverTimestamp() });
}

function queueSync(){
  if (!SYNC || !SYNC.enabled) return;
  clearTimeout(SYNC_PUSH_TIMER);
  SYNC_PUSH_TIMER = setTimeout(function(){ syncNow(); }, 5000);
}

async function syncSendOutboxIfNeeded(source){
  if (!SYNC || !SYNC.enabled) {
    if (source === "review") patchOutboxStatus(STR.sendOff);
    return false;
  }
  var payload = buildOutboxBatch(DB.cases, todayISO(), uid(), STATS);
  if (!payload.seeds.length) {
    if (source === "review") patchOutboxStatus("");
    return false;
  }
  if (OUTBOX_SENDING) return false;
  OUTBOX_SENDING = true;
  if (source === "review") patchOutboxStatus("送信中…");
  try {
    var fb = await syncApp();
    var user = await syncCurrentUser(fb);
    if (!user) {
      if (source === "review") patchOutboxStatus(STR.sendFailed);
      setSyncStatus("reauth");
      return false;
    }
    var refs = syncRefs(fb, user.uid);
    var key = await syncAesKey();
    var enc = await syncEncryptJson(key, payload);
    await fb.fs.setDoc(refs.outboxDoc(payload.batchId), {
      v:1,
      iv:enc.iv,
      blob:enc.blob,
      consumed:false,
      createdAt:fb.fs.serverTimestamp()
    });
    var sentIso = nowISO();
    DB.cases = DB.cases.map(function(c){
      var touched = false;
      var nextSeeds = c.seeds.map(function(seed){
        if (seed.sentAt != null) return seed;
        var found = payload.seeds.some(function(row){ return row.caseId === c.id && row.seedId === seed.id; });
        if (!found) return seed;
        touched = true;
        return Object.assign({}, seed, { sentAt:sentIso });
      });
      if (!touched) return c;
      var updated = Object.assign({}, c, { seeds:nextSeeds, lastTouchedAt:c.lastTouchedAt });
      // sentAt is a mirror edit outside mutateCase: absorb it into entries so
      // the stamp survives the next normalize and syncs element-wise.
      entriesReconcileLocal(updated, sentIso, todayISO());
      return updated;
    });
    saveState();
    syncAfterSave();
    if (source === "review") patchOutboxStatus(STR.sendOk);
    return true;
  } catch (e) {
    if (source === "review") patchOutboxStatus(STR.sendFailed);
    return false;
  } finally {
    OUTBOX_SENDING = false;
  }
}

async function syncNow(opts){
  opts = opts || {};
  if (!SYNC || !SYNC.enabled) return;
  if (SYNC_RUNNING) {
    SYNC_PENDING = true;
    return;
  }
  SYNC_RUNNING = true;
  setSyncStatus("syncing");
  try {
    var fb = await syncApp();
    var user = await syncCurrentUser(fb);
    if (!user) {
      setSyncStatus("reauth");
      return;
    }
    var remoteCases = await syncPullCases(fb, user.uid);
    var remoteConfig = await syncPullConfig(fb, user.uid);
    // Config merges FIRST: case reconcile ends in normalizeState, whose
    // stage-exists fallback would clobber assignments to a stage that arrives
    // in this very sync from the other device.
    var cfgRes = syncReconcileConfig(DB, SYNC.state, remoteConfig, nowISO());
    var res = syncReconcile(cfgRes.data, SYNC.state, remoteCases, nowISO());
    DB = normalizeState(res.data);
    DB._configMt = JSON.parse(JSON.stringify((SYNC.state && SYNC.state.configMt) || {}));
    if (res.localChanged || cfgRes.localChanged) {
      saveState();
      render();
    }
    if (res.pushes.length) {
      await syncPushCases(fb, user.uid, res.pushes);
      syncClearDirty(SYNC.state, res.pushes.map(function(p){ return p.id; }));
    }
    if (cfgRes.push) {
      await syncPushConfig(fb, user.uid);
      syncClearConfigDirty(SYNC.state);
    }
    SYNC.lastSyncAt = nowISO();
    saveSync();
    setSyncStatus("ok");
    // Seeds are sent only on review completion and at boot (SPEC-C section 2);
    // sending from every sync made the review-screen fallback meaningless.
  } catch (e) {
    saveSync();
    var msg = String((e && e.message) || e);
    var offline = (typeof navigator !== "undefined" && navigator.onLine === false) || /network|failed to fetch|imported/i.test(msg);
    if (!offline && typeof console !== "undefined" && console.warn) console.warn("wardbook sync error:", e);
    setSyncStatus(offline ? "offline" : "error");
  } finally {
    SYNC_RUNNING = false;
    if (SYNC_PENDING) {
      SYNC_PENDING = false;
      queueSync();
    }
  }
}

function syncAfterSave(){
  if (!SYNC || !SYNC.enabled) return;
  syncNoteLocalChanges(DB, SYNC.state, nowISO());
  saveSync();
  queueSync();
}

function parseFirebaseConfig(text){
  var keys = ["apiKey", "authDomain", "projectId", "storageBucket", "messagingSenderId", "appId"];
  var cfg = {};
  keys.forEach(function(k){
    var m = String(text || "").match(new RegExp(k + '["\\\']?\\s*[:=]\\s*["\\\']([^"\\\']+)["\\\']'));
    if (m) cfg[k] = m[1];
  });
  if (!cfg.apiKey || !cfg.projectId || !cfg.appId) return null;
  if (!cfg.authDomain) cfg.authDomain = cfg.projectId + ".firebaseapp.com";
  return cfg;
}

async function enableSync(cfg, email, password, passphrase){
  var fb = await syncApp(cfg);
  var authInst = fb.auth.getAuth(SYNC_RT.appInst);
  var cred;
  try {
    cred = await fb.auth.signInWithEmailAndPassword(authInst, email, password);
  } catch (e) {
    var code = e && e.code;
    if (code === "auth/user-not-found" || code === "auth/invalid-credential" || code === "auth/invalid-login-credentials") {
      cred = await fb.auth.createUserWithEmailAndPassword(authInst, email, password);
    } else {
      throw e;
    }
  }
  var uidValue = cred.user.uid;
  var refs = syncRefs(fb, uidValue);
  var metaSnap = await fb.fs.getDoc(refs.cryptoDoc);
  var salt;
  var iter;
  var key;
  if (metaSnap.exists()) {
    var meta = metaSnap.data();
    salt = meta.salt;
    iter = meta.iter || PBKDF2_ITER;
    key = await syncDeriveKey(passphrase, salt, iter);
    await syncDecryptJson(key, meta.check.blob, meta.check.iv);
  } else {
    salt = syncRandomSaltB64();
    iter = PBKDF2_ITER;
    key = await syncDeriveKey(passphrase, salt, iter);
    var check = await syncEncryptJson(key, { check:"wardbook" });
    await fb.fs.setDoc(refs.cryptoDoc, { v:1, salt:salt, iter:iter, check:check });
  }
  SYNC_RT.key = key;
  SYNC = {
    enabled:true,
    config:cfg,
    email:email,
    uid:uidValue,
    salt:salt,
    iter:iter,
    keyJwk:await crypto.subtle.exportKey("jwk", key),
    state:syncEmptyState(),
    lastSyncAt:null
  };
  saveSync();
  setSyncStatus("idle");
  await syncNow();
}

async function doEnableSync(){

}

function disableSync(){
  if (!confirm("この端末の同期を止めます。端末内データとサーバ上のデータは消えません。よろしいですか？")) return;
